<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Monkey Shuttle">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#000000">
<title>Monkey Shuttle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{width:100%;height:100%;margin:0;padding:0;overflow:hidden;background:#000}
body{width:100vw;height:100vh;margin:0;padding:0;overflow:hidden;background:#000;font-family:'Orbitron',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation;overscroll-behavior:none;-webkit-touch-callout:none;display:flex;align-items:center;justify-content:center;position:fixed;top:0;left:0}
#wrap{position:relative;flex-shrink:0}
canvas{display:block;border-radius:12px;touch-action:none}
#score1{position:absolute;top:12px;left:12px;font-size:28px;font-weight:900;color:#fff;text-shadow:0 0 12px #ffaa00;pointer-events:none}
#pauseBtn{position:absolute;top:10px;right:10px;width:44px;height:44px;border-radius:50%;background:rgba(0,0,10,.45);border:1px solid rgba(255,255,255,.25);color:rgba(255,255,255,.75);font-size:16px;display:none;align-items:center;justify-content:center;cursor:pointer;user-select:none;-webkit-user-select:none;z-index:5}
#pauseBtn:active{background:rgba(0,0,10,.75);color:#fff}
#streakEl{position:absolute;top:96px;left:0;width:100%;text-align:center;font-size:12px;color:#ff9900;opacity:0;transition:opacity .3s;pointer-events:none;letter-spacing:1px;text-shadow:0 1px 4px rgba(0,0,0,.7)}
#hullEl{position:absolute;top:54px;left:50%;transform:translateX(-50%);pointer-events:none;opacity:0;transition:opacity .3s;display:flex;flex-direction:column;align-items:center;gap:3px;filter:drop-shadow(0 2px 6px rgba(0,0,0,.5))}
#hullLabel{font-size:9px;font-weight:700;letter-spacing:2px;color:#aaccee;text-shadow:0 0 6px #2266aa}
#hullBar{width:160px;height:10px;background:rgba(255,255,255,.07);border:1px solid rgba(120,170,220,.4);border-radius:5px;overflow:hidden;position:relative;box-shadow:0 0 8px rgba(68,170,255,.2)}
#hullFill{height:100%;width:100%;background:linear-gradient(90deg,#44aaff 0%,#88ccff 50%,#aadeff 100%);border-radius:4px;transition:width .35s cubic-bezier(.4,.7,.3,1.3)}
#hullFill.warn{background:linear-gradient(90deg,#ffaa00 0%,#ffcc44 100%)}
#hullFill.crit{background:linear-gradient(90deg,#ff3300 0%,#ff6644 100%);animation:hullPulse 0.6s ease-in-out infinite alternate}
#hullFill.shield{background:linear-gradient(90deg,#ffcc00 0%,#ffee44 50%,#ffcc00 100%);box-shadow:0 0 12px rgba(255,204,0,.6),inset 0 0 6px rgba(255,238,68,.5)}
@keyframes hullPulse{from{box-shadow:inset 0 0 4px rgba(255,80,80,.4)}to{box-shadow:inset 0 0 12px rgba(255,120,80,.9),0 0 8px rgba(255,80,80,.5)}}
#hullSegments{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;pointer-events:none}
.hull-seg{flex:1;border-right:1px solid rgba(0,0,0,.35)}
.hull-seg:last-child{border-right:none}
#pubar{position:absolute;bottom:env(safe-area-inset-bottom,14px);left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .4s;pointer-events:none;padding-bottom:4px}
#pufill{width:70px;height:7px;background:#333;border-radius:3px;overflow:hidden}
#puinner{height:100%;width:0%;background:linear-gradient(90deg,#ffcc00,#ff8800);border-radius:3px}
#pulabel{font-size:9px;color:#ffcc00;letter-spacing:1px}
#overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,10,.96);z-index:10;border-radius:12px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 8px env(safe-area-inset-bottom,8px)}
button{min-height:44px;-webkit-appearance:none;outline:none}

#fps{position:absolute;top:8px;left:8px;color:#88ff88;font-family:'Courier New',monospace;font-size:10px;font-weight:700;background:rgba(0,0,0,.5);padding:3px 6px;border-radius:4px;pointer-events:none;z-index:100;display:none;text-shadow:0 0 4px rgba(0,255,0,.5);min-width:80px;line-height:1.4}
#fps.warn{color:#ffaa44;text-shadow:0 0 4px rgba(255,170,68,.5)}
#fps.crit{color:#ff4444;text-shadow:0 0 4px rgba(255,68,68,.5)}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="pauseBtn">❚❚</div>
  <div id="score1"></div>
  <div id="streakEl"></div><div id="hullEl"><div id="hullLabel">HULL INTEGRITY</div><div id="hullBar"><div id="hullFill"></div><div id="hullSegments"></div></div></div>
  <div id="pubar"><span id="pulabel">x2 BANANA</span><div id="pufill"><div id="puinner"></div></div></div>
  <div id="fps"></div>
  <div id="overlay"></div>
</div>
<script>
// ── SCALING ──────────────────────────────────────────────────────
const GAME_W=400,GAME_H=600;
const C=document.getElementById('c'),ctx=C.getContext('2d',{alpha:false});
const wrap=document.getElementById('wrap');
C.width=GAME_W;C.height=GAME_H;
let scale=1;
let state='menu';
function resize(){
  const vw=window.innerWidth,vh=window.innerHeight;
  scale=vh/GAME_H;
  if(GAME_W*scale>vw)scale=vw/GAME_W;
  if(scale>2)scale=2;
  wrap.style.width=GAME_W+'px';
  wrap.style.height=GAME_H+'px';
  wrap.style.transform=`scale(${scale})`;
  wrap.style.transformOrigin='center center';
  wrap.style.marginTop='0';
}
window.addEventListener('resize',resize,{passive:true});resize();

// Pause/resume on visibility change (battery saver + App Store requirement)
let gamePaused=false;
function setPaused(p){
  gamePaused=p;
  if(p){if(AC&&AC.state==='running'){try{AC.suspend();}catch(e){}}}
  else{if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}}
}
document.addEventListener('visibilitychange',()=>{
  setPaused(document.hidden);
});
// iOS WebView sometimes fires pagehide without visibility change
window.addEventListener('pagehide',()=>setPaused(true));
window.addEventListener('pageshow',()=>setPaused(false));
window.addEventListener('blur',()=>{
  // Don't pause on blur — iOS WebView fires this spuriously
});
window.addEventListener('focus',()=>setPaused(false));
// Safety: every 1s, if document is NOT hidden, force unpause.
// Must cover ALL states (not just gameplay) because gamePaused freezes the
// entire loop — a spurious iOS pause event on the menu would otherwise
// freeze the game with no recovery path.
setInterval(()=>{
  if(!document.hidden&&gamePaused)setPaused(false);
},1000);

// ── USER PAUSE (deliberate, via pause button) ────────────────────
// Separate from gamePaused: gamePaused freezes the whole loop (iOS
// backgrounding) and is force-cleared by the watchdog above. userPaused
// keeps rendering a frozen frame with an overlay, and skips updates.
let userPaused=false;
let pauseMode=null;        // 'paused' | 'countdown'
let countdownTimer=0;      // frames remaining in 3-2-1 (40 per digit)
let lastCountdownDigit=0;
const PAUSABLE_STATES=['playing','bonus','approach','blackhole'];
function userPause(){
  if(userPaused||!PAUSABLE_STATES.includes(state))return;
  userPaused=true;pauseMode='paused';
  if(AC&&AC.state==='running'){try{AC.suspend();}catch(e){}}
}
function startResumeCountdown(){
  pauseMode='countdown';countdownTimer=120;lastCountdownDigit=0;
  if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}
}
function finishResume(){
  userPaused=false;pauseMode=null;
}
function quitToMenu(){
  userPaused=false;pauseMode=null;planetCardActive=false;
  if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}
  showMenu();
}
const W=GAME_W,H=GAME_H;
const s1El=document.getElementById('score1');
const streakEl=document.getElementById('streakEl'),hullEl=document.getElementById('hullEl');
const puBar=document.getElementById('pubar'),puInner=document.getElementById('puinner');
const OV=document.getElementById('overlay');

// ── AUDIO ────────────────────────────────────────────────────────
// Sound preference — must be declared before tone() can reference it
let soundEnabled=true;
try{const v=localStorage.getItem('ms9_soundEnabled');if(v!==null)soundEnabled=JSON.parse(v);}catch(e){}
let vibrateEnabled=true;
try{const v=localStorage.getItem('ms9_vibrateEnabled');if(v!==null)vibrateEnabled=JSON.parse(v);}catch(e){}
function vibrate(pattern){
  if(!vibrateEnabled)return;
  if(navigator.vibrate){try{navigator.vibrate(pattern);}catch(e){}}
}
function toggleVibrate(){
  vibrateEnabled=!vibrateEnabled;
  try{localStorage.setItem('ms9_vibrateEnabled',JSON.stringify(vibrateEnabled));}catch(e){}
  if(vibrateEnabled)vibrate(20); // confirm tactile feedback
}
function toggleSound(){
  soundEnabled=!soundEnabled;
  try{localStorage.setItem('ms9_soundEnabled',JSON.stringify(soundEnabled));}catch(e){}
  if(!soundEnabled&&AC){try{AC.suspend();}catch(e){}}
  else if(soundEnabled&&AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}}
}
let AC;
function ensureAC(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==='suspended')AC.resume();}
function tone(f,d,t='sine',v=.22,dl=0){if(!AC||!soundEnabled)return;try{const o=AC.createOscillator(),g=AC.createGain();o.connect(g);g.connect(AC.destination);o.type=t;o.frequency.setValueAtTime(f,AC.currentTime+dl);g.gain.setValueAtTime(v,AC.currentTime+dl);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+dl+d);o.start(AC.currentTime+dl);o.stop(AC.currentTime+dl+d+.05);}catch(e){}}
const sndScore=()=>{tone(523,.07,'square',.12);tone(659,.07,'square',.12,.08);};
const sndThrust=()=>tone(170,.07,'sawtooth',.07);
const sndBanana=()=>{tone(880,.05,'sine',.18);tone(1100,.09,'sine',.18,.06);};
const sndCheer=()=>[523,587,659,784,880].forEach((f,i)=>tone(f,.11,'sine',.16,i*.07));
const sndUpgrade=()=>{tone(660,.1,'sine',.2);tone(1100,.15,'sine',.2,.12);};
const sndBananaChime=()=>tone(1047,.07,'sine',.12);
const sndBounce=()=>{tone(400,.05,'sine',.25);tone(200,.1,'sine',.15,.05);};
const sndLucky=()=>{tone(880,.08,'sine',.2);tone(1320,.08,'sine',.2,.06);tone(1760,.12,'sine',.2,.12);};
const sndWingSnap=()=>{tone(150,.2,'sawtooth',.3);tone(80,.15,'sawtooth',.2,.1);};
function playBananaSound(){sndBananaChime();}
function playDeathSound(){tone(300,.14,'sawtooth',.16);tone(180,.2,'sawtooth',.16,.14);tone(100,.35,'sawtooth',.13,.28);}

// ── PLANET & BONUS SYSTEM ────────────────────────────────────────
const PLANET_SEQ=[
  {name:'MOON',   score:50,  grav:.06, skyTop:'#000008',skyBot:'#050510',
   groundCol:'#7a8090',groundCol2:'#4a5060',accent:'#aabbcc',
   hasSurface:true, hazard:'fallingbanana', windX:0, bonusBananas:60},
  {name:'MARS',   score:120, grav:.22, skyTop:'#180800',skyBot:'#2a1000',
   groundCol:'#aa4422',groundCol2:'#882200',accent:'#ff6644',
   hasSurface:true, hazard:'fallingbanana', windX:.3, bonusBananas:80},
  {name:'SATURN', score:220, grav:.30, skyTop:'#0a0600',skyBot:'#140a00',
   groundCol:'#ddbb88',groundCol2:'#bb9966',accent:'#eedd99',
   hasSurface:true, hazard:'fallingbanana', windX:0, bonusBananas:130},
  {name:'PLUTO',  score:400, grav:.04, skyTop:'#020010',skyBot:'#070518',
   groundCol:'#aaaacc',groundCol2:'#5566aa',accent:'#bbccff',
   hasSurface:true, hazard:'fallingbanana', windX:0, bonusBananas:200},
];
let planetIdx=0, loopCount=0;
let earthR=42, earthX=0, earthY=0; // Earth in gauntlet background

// Bonus level state
let BNS={
  active:false, planet:null,
  phase:'approach', // approach | surface | depart
  timer:0, departTimer:0,
  sx:80, sy:0, svy:0,       // shuttle pos/vel
  dist:0, bananas:0,
  alive:true, crashTimer:0,
  speed:3,
  obs:[],                    // surface obstacles
  spawnCD:80,
  terrain:[],                // y-values sampled every 6px
  tOff:0,                    // scroll offset into terrain array
  wind:0,
};

function planetAccent(name){
  const m={MOON:'#aabbcc',MARS:'#ff6644',ASTEROIDS:'#88aacc',
           JUPITER:'#ddaa55',SATURN:'#eedd99',NEPTUNE:'#44aaff'};
  return m[name]||'#ffcc00';
}
function nextTriggerScore(){
  if(planetIdx>=PLANET_SEQ.length)return Infinity; // all planets visited, no more
  return PLANET_SEQ[planetIdx].score;
}

// ── TERRAIN GEN ──────────────────────────────────────────────────
function makeTerrain(planet, n){
  const arr=[];
  const base=H-90;
  for(let i=0;i<n;i++){
    const x=i*6;
    let y=base;
    if(planet.name==='MOON')   y=base+Math.sin(x*.04)*20+Math.sin(x*.13)*9;
    if(planet.name==='MARS')   y=base+Math.sin(x*.05)*28+Math.sin(x*.17)*13;
    if(planet.name==='JUPITER')y=base+Math.sin(x*.03)*35+Math.sin(x*.11)*16;
    if(planet.name==='SATURN') y=base+Math.sin(x*.05)*22+Math.sin(x*.19)*10;
    if(planet.name==='PLUTO')  y=base+Math.sin(x*.04)*15+Math.sin(x*.21)*8;
    if(planet.name==='NEPTUNE')y=base+Math.sin(x*.06)*25+Math.sin(x*.22)*12;
    arr.push(y);
  }
  return arr;
}
function terrainY(tArr, tOff, screenX){
  const realX=screenX+tOff;
  const idx=Math.floor(realX/6);
  if(idx<0||idx>=tArr.length-1)return H-90;
  const t=(realX/6)-idx;
  return tArr[idx]*(1-t)+tArr[idx+1]*t;
}

// ── SURFACE OBSTACLE SPAWN ───────────────────────────────────────
function spawnSurfaceObs(){
  const pl=BNS.planet;
  const ty=terrainY(BNS.terrain,BNS.tOff,W+60);
  const r=()=>Math.random();
  const d=BNS.dist; // distance survived — hazards get harder

  if(pl.name==='MOON'){
    // Multiple bananas at varying heights
    const n=2+Math.floor(r()*2);
    for(let i=0;i<n;i++){
      BNS.obs.push({type:'fallingbanana',
        x:W+30+i*45, y:60+r()*(H-160),
        vx:-(2+r()*1.5),
        bob:r()*Math.PI*2,
        collected:false,
      });
    }
  } else if(pl.name==='MARS'){
    // Drifting bananas — multiple per spawn
    const n=2+Math.floor(r()*2);
    for(let i=0;i<n;i++){
      BNS.obs.push({type:'fallingbanana',
        x:W+30+i*40, y:60+r()*(H-160),
        vx:-(2.5+r()*1.5),
        bob:r()*Math.PI*2,
        collected:false,
      });
    }

  } else if(pl.name==='SATURN'){
    // Drifting bananas — multiple per spawn, like Moon/Mars
    const n=4+Math.floor(r()*3);
    for(let i=0;i<n;i++){
      BNS.obs.push({type:'fallingbanana',
        x:W+30+i*32, y:60+r()*(H-200),
        vx:-(2.8+r()*1.6),
        bob:r()*Math.PI*2,
        collected:false,
      });
    }
  } else if(pl.name==='PLUTO'){
    // Floaty low-grav bananas with slow drift
    const n=4+Math.floor(r()*3);
    for(let i=0;i<n;i++){
      BNS.obs.push({type:'fallingbanana',
        x:W+30+i*36, y:50+r()*(H-180),
        vx:-(2.2+r()*1.2),
        bob:r()*Math.PI*2,
        collected:false,
      });
    }

  }
}

function bonusHit(o){
  const bx=BNS.sx,by=BNS.sy,br=11;
  
  if(o.type==='planetwrench'&&!o.collected){
    const dx=bx-o.x,dy=by-o.y;
    if(dx*dx+dy*dy<(br+40)*(br+40)){
      o.collected=true;
      runStats.wrenches++;
      // Add 2 bounce charges
      p1.bounceCharges=p1.bounceCharges+2;
      // Trigger animated repair (monkey climbs out)
      startRepair();
      repair.fullRestore=true;
      sndUpgrade();vibrate(30);
      spawnP(o.x,o.y,'#44ddff',24);spawnP(o.x,o.y,'#ffffff',12);
      showStreak('🐒 REPAIRING...');
      updateHullUI();
    }
    return false; // not lethal
  }
  if(o.type==='fallingbanana'&&!o.collected){
    const mag=upgrades.magnet*12;
    const dx=bx-o.x,dy=by-o.y;
    // Magnet pull
    if(mag>0){
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<80+mag&&dist>0){
        o.x+=dx/dist*1.2;o.y+=dy/dist*1.2;
      }
    }
    const radius=14+mag*.3;
    if(dx*dx+dy*dy<(br+radius)*(br+radius)){
      o.collected=true;
      BNS.bananas+=1;
      runStats.bananas++;
      sndBanana();spawnP(o.x,o.y,'#ffee00',8);
    }
  }
  return false;
}

function startBonus(planet){
  ensureAC();
  BNS.planet=planet; BNS.phase='approach'; BNS.timer=0;
  BNS.sx=70; BNS.sy=H*.4; BNS.svy=0;
  BNS.dist=0; BNS.bananas=0; BNS.alive=true; BNS.crashed=false; BNS.crashTimer=0;
  BNS.wrenchSpawned=false; BNS.wrenchSpawnTime=600+Math.floor(Math.random()*601); // 10-20s
  BNS.speed=3.5+loopCount*.6; BNS.spawnCD=80; BNS.obs=[];
  BNS.tOff=0;
  BNS.terrain=planet.hasSurface?makeTerrain(planet,2200):[];
  state='bonus';
  updateHullUI();
  tone(300,.2,'sine',.2);tone(500,.3,'sine',.18,.15);
}

function updateBonus(){
  BNS.timer++;
  if(BNS.phase==='approach'){
    if(!tipPlanetSeen&&BNS.timer>=60){BNS.timer=60;planetCardActive=true;}
    if(BNS.timer>100){BNS.phase='surface';BNS.timer=0;}return;
  }
  if(BNS.phase==='depart'){
    BNS.departTimer++;
    if(BNS.departTimer>90){
      state='resume';
      const earned=BNS.bananas;
      bananasRun+=earned;
      showStreak('+'+earned+' 🍌 FROM '+BNS.planet.name+'!');
      if(!BNS.crashed)runStats.planets++;
      planetIdx++;
      earthR=Math.max(8,42-planetIdx*6);
      // Reset shuttle to centre and pause physics
      p1.y=H/2;p1.vy=0;
    }
    return;
  }
  // LAUNCH (timer ran out — rocket flies up off screen)
  if(BNS.phase==='launch'){
    BNS.launchTimer++;
    // Accelerate upward
    BNS.svy=Math.max(BNS.svy-0.6,-14);
    BNS.sy+=BNS.svy;
    // After flying off top, transition to depart
    if(BNS.sy<-80||BNS.launchTimer>120){BNS.phase='depart';BNS.departTimer=0;}
    return;
  }
  // SURFACE
  if(!BNS.alive){
    BNS.crashTimer++;
    if(BNS.crashTimer>80){BNS.phase='depart';BNS.departTimer=0;}
    return;
  }
  // Time limit: 30 seconds — launch animation when time hits 0
  // Spawn one wrench during planet bonus (10-20s window)
  if(BNS.alive&&!BNS.wrenchSpawned&&BNS.timer>=BNS.wrenchSpawnTime){
    BNS.wrenchSpawned=true;
    BNS.obs.push({type:'planetwrench',
      x:W+30, y:80+Math.random()*(H-200),
      vx:-(2.5+Math.random()*1.2),
      bob:Math.random()*Math.PI*2,
      rot:0,
      collected:false,
    });
  }
  if(BNS.alive&&BNS.timer>1800){
    // Successful flyby: add planet's bonusBananas as a completion bonus
    BNS.bananas+=BNS.planet.bonusBananas;
    BNS.phase='launch';BNS.launchTimer=0;BNS.alive=false;
    showStreak('✓ SUCCESSFUL FLYBY! +'+BNS.bananas+' 🍌');
    return;
  }
  // Physics
  BNS.svy+=BNS.planet.grav;
  if(BNS.planet.windX)BNS.sx+=Math.sin(BNS.timer*.05)*BNS.planet.windX;
  BNS.sx=Math.max(30,Math.min(W-30,BNS.sx));
  BNS.sy+=BNS.svy;
  BNS.dist+=BNS.speed*.018;
  // Bananas are accumulated only by collected bananas — no distance override
  // Terrain scroll
  BNS.tOff+=BNS.speed;
  // Ceiling/floor
  if(BNS.sy<18){BNS.sy=18;BNS.svy=Math.abs(BNS.svy)*.4;}
  if(BNS.planet.hasSurface){
    const ty=terrainY(BNS.terrain,BNS.tOff,BNS.sx);
    if(BNS.sy+14>ty){bonusCrash();return;}
  } else if(BNS.sy>H-20){bonusCrash();return;}
  // Spawn obstacles
  BNS.spawnCD--;
  if(BNS.spawnCD<=0){
    spawnSurfaceObs();
    // Tighter spawn rate for more bananas everywhere
    if(BNS.planet.name==='MOON'){
      BNS.spawnCD=Math.max(15,28-Math.floor(BNS.dist*2));
    } else {
      BNS.spawnCD=Math.max(18,32-Math.floor(BNS.dist*3));
    }
  }
  // Update obstacles
  for(let i=BNS.obs.length-1;i>=0;i--){
    const o=BNS.obs[i];
    // Scroll obstacles left or move independently
    if(o.type==='fallingbanana'){o.x+=o.vx;o.bob+=.08;o.y+=Math.sin(o.bob)*.4;}
    else if(o.type==='planetwrench'){o.x+=o.vx;o.bob+=.08;o.rot+=.04;o.y+=Math.sin(o.bob)*.5;}
    else{o.x-=BNS.speed;}
    const gone=
      o.type==='fallingbanana'?o.x<-40:
      o.type==='planetwrench'?o.x<-60:
      o.x<-140;
    if(gone){BNS.obs.splice(i,1);continue;}
    if(bonusHit(o)){bonusCrash();return;}
  }
  spawnEx(BNS.sx,BNS.sy+22);
  if(BNS.phase==='launch'){
    // big rocket exhaust
    spawnEx(BNS.sx-3,BNS.sy+22);spawnEx(BNS.sx+3,BNS.sy+22);
    spawnEx(BNS.sx,BNS.sy+24);
  }
}

function bonusCrash(){
  BNS.alive=false;BNS.crashed=true;BNS.crashTimer=0;
  BNS.bananas=Math.floor(BNS.bananas*.35);
  shake=12;flash=.5;flashCol='#ff4400';
  spawnP(BNS.sx,BNS.sy,'#ff6600',14);spawnP(BNS.sx,BNS.sy,'#ffcc00',8);
  tone(300,.14,'sawtooth',.16);tone(100,.35,'sawtooth',.13,.2);
  showStreak('✗ CRASH LANDING!');
}

function bonusJump(){
  if(BNS.phase!=='surface'||!BNS.alive)return;
  ensureAC();
  const str=BNS.planet.name==='MOON'?-4.5:BNS.planet.name==='JUPITER'?-9.5:-7;
  BNS.svy=str;sndThrust();
}

// ── REAL PLANET DRAW ─────────────────────────────────────────────
function drawPlanetSprite(c,x,y,r,name,alpha=1){
  if(r<2)return;
  c.save();c.globalAlpha=alpha;

  // Saturn's rings — drawn BEFORE the planet, behind it
  if(name==='SATURN'){
    c.save();c.globalAlpha=alpha*.6;
    c.strokeStyle='#ccbb88';c.lineWidth=r*.09;
    c.beginPath();c.ellipse(x,y,r*1.65,r*.4,0,0,Math.PI*2);c.stroke();
    c.lineWidth=r*.05;c.strokeStyle='#ddcc99';
    c.beginPath();c.ellipse(x,y,r*1.95,r*.48,0,0,Math.PI*2);c.stroke();
    c.restore();
  }

  // Clip everything inside a circle so the planet body is round
  c.save();
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.clip();

  if(name==='EARTH'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#2288dd');g.addColorStop(1,'#114488');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
    c.fillStyle='#44aa44';
    c.beginPath();c.ellipse(x-r*.1,y-r*.15,r*.38,r*.48,-.4,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(x+r*.22,y+r*.2,r*.26,r*.32,.3,0,Math.PI*2);c.fill();
    c.globalAlpha=alpha*.35;c.fillStyle='#fff';
    c.beginPath();c.ellipse(x-r*.2,y+r*.3,r*.3,r*.07,-.2,0,Math.PI*2);c.fill();
    c.beginPath();c.ellipse(x+r*.1,y-r*.3,r*.25,r*.07,.1,0,Math.PI*2);c.fill();
  } else if(name==='MOON'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#ccccdd');g.addColorStop(1,'#6a7080');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
    c.globalAlpha=alpha*.3;c.strokeStyle='#556677';c.lineWidth=1.5;
    [[-.3,-.2,.15],[.2,.3,.1],[-.05,.35,.08],[.35,-.1,.06]].forEach(([cx,cy,cr])=>{c.beginPath();c.arc(x+cx*r,y+cy*r,cr*r,0,Math.PI*2);c.stroke();});
  } else if(name==='MARS'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#cc5533');g.addColorStop(1,'#882200');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
    c.globalAlpha=alpha*.55;c.fillStyle='#ddeeff';
    c.beginPath();c.ellipse(x,y-r*.72,r*.22,r*.12,0,0,Math.PI*2);c.fill();
  } else if(name==='JUPITER'){
    c.fillStyle='#cc9944';c.fillRect(x-r,y-r,r*2,r*2);
    [['#ddaa55',-.5,.18],['#bb8833',-.15,.22],['#cc9944',.2,.16],['#bb7722',.5,.14]].forEach(([col,dy,dh])=>{
      c.globalAlpha=alpha*.7;c.fillStyle=col;c.fillRect(x-r,y+dy*r,r*2,dh*r);
    });
    c.globalAlpha=alpha*.7;c.fillStyle='#cc3311';
    c.beginPath();c.ellipse(x+r*.2,y+r*.15,r*.18,r*.09,0,0,Math.PI*2);c.fill();
  } else if(name==='SATURN'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#eedd99');g.addColorStop(1,'#bb9944');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
  } else if(name==='NEPTUNE'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#4488cc');g.addColorStop(1,'#113366');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
    c.globalAlpha=alpha*.45;c.fillStyle='#2255aa';
    c.beginPath();c.ellipse(x+r*.1,y-r*.1,r*.28,r*.14,-.3,0,Math.PI*2);c.fill();
  } else if(name==='PLUTO'){
    const g=c.createRadialGradient(x-r*.3,y-r*.3,r*.05,x,y,r);
    g.addColorStop(0,'#ddccbb');g.addColorStop(1,'#776655');
    c.fillStyle=g;c.fillRect(x-r,y-r,r*2,r*2);
  } else {
    // Default fallback — solid grey
    c.fillStyle='#888';c.fillRect(x-r,y-r,r*2,r*2);
  }
  c.restore(); // end clip

  // Subtle outer edge highlight (a thin lit rim, not the old blocky glow)
  c.save();c.globalAlpha=alpha*.25;
  const rim=c.createRadialGradient(x,y,r*.92,x,y,r);
  rim.addColorStop(0,'rgba(255,255,255,0)');
  rim.addColorStop(1,'rgba(255,255,255,.6)');
  c.fillStyle=rim;
  c.beginPath();c.arc(x,y,r,0,Math.PI*2);c.fill();
  c.restore();

  c.restore();
}

// ── FLYOVER SURFACE DETAIL ───────────────────────────────────────
// Surface texture drawn ON TOP of the foreground terrain.
// Uses scroll offset so features move with the ground. Deterministic.
function drawSurfaceTexture(pl){
  const scroll=BNS.tOff;
  ctx.save();
  if(pl.name==='MOON'){
    // Scattered small craters + rocks on the grey surface
    ctx.globalAlpha=.4;
    for(let i=0;i<14;i++){
      const wx=(i*180+90); // world x
      const sx=((wx-scroll)%(W+120)+(W+120))%(W+120)-60;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-10)continue;
      const cr=3+((i*7)%5);
      // crater: dark bowl + light rim
      ctx.fillStyle='rgba(40,45,60,.5)';
      ctx.beginPath();ctx.ellipse(sx,ty+8+(i%3)*6,cr,cr*.5,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(190,198,215,.4)';ctx.lineWidth=.8;
      ctx.beginPath();ctx.ellipse(sx,ty+8+(i%3)*6,cr+1,cr*.5+.5,0,0,Math.PI*2);ctx.stroke();
    }
    // Small rocks
    ctx.globalAlpha=.5;ctx.fillStyle='rgba(60,66,82,.6)';
    for(let i=0;i<10;i++){
      const wx=(i*230+50);
      const sx=((wx-scroll*1.05)%(W+100)+(W+100))%(W+100)-50;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-6)continue;
      ctx.beginPath();ctx.arc(sx,ty+4+(i%2)*4,1.5+(i%3),0,Math.PI*2);ctx.fill();
    }
  } else if(pl.name==='MARS'){
    // Darker rock clusters + boulders on red terrain
    ctx.globalAlpha=.45;
    for(let i=0;i<12;i++){
      const wx=(i*200+70);
      const sx=((wx-scroll)%(W+120)+(W+120))%(W+120)-60;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-8)continue;
      ctx.fillStyle='rgba(90,35,20,.6)';
      const br=2.5+((i*5)%4);
      ctx.beginPath();ctx.arc(sx,ty+6+(i%3)*5,br,0,Math.PI*2);ctx.fill();
      // lighter dust patch
      ctx.fillStyle='rgba(200,110,70,.3)';
      ctx.beginPath();ctx.ellipse(sx+5,ty+10,br*1.5,br*.5,0,0,Math.PI*2);ctx.fill();
    }
    // Dust streaks
    ctx.globalAlpha=.18;ctx.strokeStyle='#ddaa88';ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      const wx=(i*260+30);
      const sx=((wx-scroll*.9)%(W+100)+(W+100))%(W+100)-50;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      ctx.beginPath();ctx.moveTo(sx,ty+8);ctx.lineTo(sx+30,ty+12);ctx.stroke();
    }
  } else if(pl.name==='SATURN'){
    // Cloud-top wisps on the "surface"
    ctx.globalAlpha=.25;ctx.fillStyle='#fff5dd';
    for(let i=0;i<10;i++){
      const wx=(i*170+40);
      const sx=((wx-scroll)%(W+120)+(W+120))%(W+120)-60;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-6)continue;
      ctx.beginPath();ctx.ellipse(sx,ty+8,12+(i%3)*4,3,0,0,Math.PI*2);ctx.fill();
    }
  } else if(pl.name==='PLUTO'){
    // Ice cracks + frost sheen
    ctx.globalAlpha=.35;ctx.strokeStyle='rgba(220,235,255,.6)';ctx.lineWidth=1;
    for(let i=0;i<10;i++){
      const wx=(i*190+60);
      const sx=((wx-scroll)%(W+120)+(W+120))%(W+120)-60;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-8)continue;
      // jagged crack
      ctx.beginPath();ctx.moveTo(sx,ty+6);
      ctx.lineTo(sx+6,ty+10);ctx.lineTo(sx+3,ty+16);ctx.lineTo(sx+9,ty+22);
      ctx.stroke();
    }
    // Frost patches
    ctx.globalAlpha=.2;ctx.fillStyle='#eaf2ff';
    for(let i=0;i<8;i++){
      const wx=(i*240+100);
      const sx=((wx-scroll*1.04)%(W+120)+(W+120))%(W+120)-60;
      const ty=terrainY(BNS.terrain,BNS.tOff,sx);
      if(ty>H-6)continue;
      ctx.beginPath();ctx.ellipse(sx,ty+8,8,3,0,0,Math.PI*2);ctx.fill();
    }
  }
  ctx.restore();
}

// ── BONUS DRAW ───────────────────────────────────────────────────
function drawBonus(){
  ctx.clearRect(0,0,W,H);
  const pl=BNS.planet;
  const t01=Math.min(1,BNS.timer/100);

  if(BNS.phase==='approach'){
    // Space bg fading to planet sky
    ctx.fillStyle='#01060f';ctx.fillRect(0,0,W,H);
    // Stars fading out
    for(const s of stars){ctx.save();ctx.globalAlpha=(1-t01)*(.35+s.b*.65);ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();ctx.restore();}
    // Planet growing from dot
    const pr=4+t01*t01*180;
    drawPlanetSprite(ctx,W/2,H/2,pr,pl.name);
    // Approach text
    ctx.save();ctx.globalAlpha=Math.min(1,t01*2);
    ctx.fillStyle=planetAccent(pl.name);ctx.font='bold 16px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText('APPROACHING '+pl.name,W/2,H-70);
    ctx.fillStyle='#666';ctx.font='10px Orbitron,monospace';
    ctx.fillText('TAP TO BOOST ON THE SURFACE',W/2,H-48);
    ctx.restore();
    // Shuttle flying toward it
    drawShuttleAt(ctx,W/2-60+t01*60,H/2+30-t01*30,-.15,
      {alive:true,bananaMulti:1,luckyTimer:0,
       wingState:p1.wingState||'both',
       lopsideAngle:p1.lopsideAngle||0,
       graceTimer:0,vy:-2,sweatTimer:0,nearMissTimer:0,fistTimer:0,tearY:0,tearAlpha:0,cheerTimer:0},false);
    // First-planet intro card (one-time, holds the approach at frame 60)
    if(planetCardActive){
      ctx.save();
      ctx.fillStyle='rgba(0,0,0,.68)';ctx.fillRect(0,0,W,H);
      ctx.textAlign='center';
      ctx.fillStyle=planetAccent(pl.name);ctx.font='bold 22px Orbitron,monospace';
      ctx.fillText('BONUS LEVEL',W/2,H/2-78);
      ctx.fillStyle='#ccc';ctx.font='12px Orbitron,monospace';
      ctx.fillText('30 SECONDS OVER THE SURFACE',W/2,H/2-40);
      ctx.fillText('COLLECT 🍌 AND DODGE THE TERRAIN',W/2,H/2-16);
      ctx.fillText('🔧 REPAIRS DAMAGED WINGS',W/2,H/2+8);
      const cpulse=.5+.5*Math.sin(frame*.1);
      ctx.fillStyle='rgba(255,204,0,'+cpulse+')';ctx.font='bold 16px Orbitron,monospace';
      ctx.fillText('TAP TO START — GRAB EVERY 🍌',W/2,H/2+58);
      ctx.restore();
    }
    return;
  }

  if(BNS.phase==='depart'){
    const dt=Math.min(1,BNS.departTimer/90);
    ctx.fillStyle=pl.skyTop;ctx.fillRect(0,0,W,H);
    // Planet fading
    drawPlanetCached(ctx,W*.75,H*.25,55,pl.name,1-dt*.8);
    ctx.save();ctx.globalAlpha=Math.min(1,dt*2);
    ctx.fillStyle=BNS.crashed?'#ff6644':'#44ff88';ctx.font='bold 18px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText(BNS.crashed?'✗ CRASH LANDING':'✓ SUCCESSFUL FLYBY',W/2,H/2-30);
    ctx.fillStyle='#ffcc00';ctx.font='bold 28px Orbitron,monospace';
    ctx.fillText('+'+BNS.bananas+' 🍌',W/2,H/2+10);
    ctx.fillStyle='#555';ctx.font='10px Orbitron,monospace';
    ctx.fillText(BNS.dist.toFixed(1)+' KM SURVIVED',W/2,H/2+36);
    ctx.restore();
    // Particles
    for(const p of particlePool){if(!p.active)continue;ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}
    return;
  }

  // ── SURFACE ────────────────────────────────────────────────────
  // Sky gradient
  const skyKey=pl.name;
  if(!bgGradCache[skyKey]){const sg=ctx.createLinearGradient(0,0,0,H);sg.addColorStop(0,pl.skyTop);sg.addColorStop(1,pl.skyBot||pl.skyTop);bgGradCache[skyKey]=sg;}
  ctx.fillStyle=bgGradCache[skyKey];ctx.fillRect(0,0,W,H);

  // Background planet features
  if(pl.name==='MOON'){
    // Earth visible in sky
    drawPlanetCached(ctx,W-80,80,50,'EARTH',.85);
  }
  if(pl.name==='SATURN'){
    // Solid filled rings arching across the upper sky
    ctx.save();
    const ringCX=W/2, ringCY=520;
    function drawRingBand(rx,ry,thickness,color,alpha){
      ctx.save();ctx.globalAlpha=alpha;ctx.fillStyle=color;
      ctx.beginPath();
      ctx.ellipse(ringCX,ringCY,rx,ry,0,Math.PI,Math.PI*2,false);
      const irx=rx-thickness, iry=ry-thickness*(ry/rx);
      ctx.ellipse(ringCX,ringCY,irx,iry,0,Math.PI*2,Math.PI,true);
      ctx.closePath();ctx.fill();
      ctx.restore();
    }
    drawRingBand(W*1.2,460,16,'#aa7744',.55);
    drawRingBand(W*1.18,452,4,'#1a0f00',.7);
    drawRingBand(W*1.10,432,28,'#eedd99',.75);
    drawRingBand(W*0.95,395,14,'#cc9966',.4);
    ctx.restore();
  }
  if(pl.name==='JUPITER'){
    ctx.save();ctx.globalAlpha=.1;
    [[H*.15,30,'#ddaa55'],[H*.4,40,'#bb8833'],[H*.65,28,'#cc9944']].forEach(([y,h,col])=>{ctx.fillStyle=col;ctx.fillRect(0,y,W,h);});
    ctx.restore();
  }
  if(pl.name==='PLUTO'){
    // Charon — Pluto's largest moon — looms huge in the sky
    ctx.save();
    const cx=W*.72,cy=H*.22,cr=46;
    // Outer atmospheric haze
    const halo=ctx.createRadialGradient(cx,cy,cr,cx,cy,cr*1.6);
    halo.addColorStop(0,'rgba(180,200,230,.18)');
    halo.addColorStop(1,'rgba(180,200,230,0)');
    ctx.fillStyle=halo;
    ctx.beginPath();ctx.arc(cx,cy,cr*1.6,0,Math.PI*2);ctx.fill();
    // Body
    const body=ctx.createRadialGradient(cx-12,cy-14,8,cx,cy,cr);
    body.addColorStop(0,'#d8e0ec');
    body.addColorStop(.55,'#9aa9c0');
    body.addColorStop(1,'#5566aa');
    ctx.fillStyle=body;
    ctx.beginPath();ctx.arc(cx,cy,cr,0,Math.PI*2);ctx.fill();
    // A few craters
    ctx.fillStyle='rgba(60,75,110,.35)';
    [[cx-14,cy-8,5],[cx+10,cy+4,7],[cx-4,cy+18,4],[cx+18,cy-12,3]].forEach(([x,y,r])=>{ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();});
    ctx.restore();
    // Faint distant stars (already drawn elsewhere) plus a small far black hole hint in the upper-left
    ctx.save();
    const bhx=W*.18,bhy=H*.18,bhr=10;
    const glow=ctx.createRadialGradient(bhx,bhy,bhr,bhx,bhy,bhr*4);
    glow.addColorStop(0,'rgba(255,140,40,.25)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;ctx.beginPath();ctx.arc(bhx,bhy,bhr*4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#000';ctx.beginPath();ctx.arc(bhx,bhy,bhr,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#ff8844';ctx.lineWidth=1;ctx.globalAlpha=.5;
    ctx.beginPath();ctx.arc(bhx,bhy,bhr+3,0,Math.PI*2);ctx.stroke();
    ctx.restore();
  }

  // Terrain
  if(pl.hasSurface&&BNS.terrain.length){
    // Build terrain top path once
    const topPts=[];
    for(let sx2=0;sx2<=W;sx2+=6){
      topPts.push([sx2,terrainY(BNS.terrain,BNS.tOff,sx2)]);
    }
    // Fill the body with the base gradient
    ctx.beginPath();ctx.moveTo(0,H);
    for(let i=0;i<topPts.length;i++){i===0?ctx.lineTo(0,topPts[i][1]):ctx.lineTo(topPts[i][0],topPts[i][1]);}
    ctx.lineTo(W,H);ctx.closePath();
    const tgKey='tg_'+pl.name;
    if(!bgGradCache[tgKey]){const tg=ctx.createLinearGradient(0,H-150,0,H);tg.addColorStop(0,hexBright(pl.groundCol,1.15));tg.addColorStop(.5,pl.groundCol);tg.addColorStop(1,pl.groundCol2);bgGradCache[tgKey]=tg;}
    ctx.fillStyle=bgGradCache[tgKey];ctx.fill();

    // Clip to the terrain body for all subsequent shading
    ctx.save();
    ctx.beginPath();ctx.moveTo(0,H);
    for(let i=0;i<topPts.length;i++){i===0?ctx.lineTo(0,topPts[i][1]):ctx.lineTo(topPts[i][0],topPts[i][1]);}
    ctx.lineTo(W,H);ctx.closePath();ctx.clip();

    // Deep shadow band at the very bottom for grounding
    const shKey='sh_'+pl.name;
    if(!bgGradCache[shKey]){const shg=ctx.createLinearGradient(0,H-40,0,H);shg.addColorStop(0,'rgba(0,0,0,0)');shg.addColorStop(1,'rgba(0,0,0,.4)');bgGradCache[shKey]=shg;}
    ctx.fillStyle=bgGradCache[shKey];ctx.fillRect(0,H-40,W,40);

    // Vertical striations — subtle darker columns suggesting rock texture, scrolls with terrain
    ctx.globalAlpha=.10;ctx.fillStyle=pl.groundCol2;
    const stScroll=BNS.tOff%48;
    for(let x=-48;x<W+48;x+=48){
      const sx=x-stScroll;
      ctx.fillRect(sx,H-150,16,150);
    }
    ctx.globalAlpha=1;

    // Surface texture on top of the ground (craters, rocks, etc.)
    drawSurfaceTexture(pl);

    ctx.restore(); // end terrain clip

    // Sunlit ridge line along the top edge (bright rim)
    ctx.strokeStyle=hexBright(pl.groundCol,1.8);ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let i=0;i<topPts.length;i++){i===0?ctx.moveTo(topPts[i][0],topPts[i][1]):ctx.lineTo(topPts[i][0],topPts[i][1]);}
    ctx.stroke();
    // Soft secondary highlight just under the ridge
    ctx.strokeStyle=hexBright(pl.groundCol,1.3);ctx.lineWidth=1;ctx.globalAlpha=.5;
    ctx.beginPath();
    for(let i=0;i<topPts.length;i++){const [x,y]=topPts[i];i===0?ctx.moveTo(x,y+3):ctx.lineTo(x,y+3);}
    ctx.stroke();
    ctx.globalAlpha=1;
  }
  if(pl.name==='ASTEROIDS'){
    // Distant rocks as bg
    for(let i=0;i<8;i++){ctx.save();ctx.globalAlpha=.2;ctx.fillStyle='#556677';ctx.beginPath();ctx.arc((i*137+frame*.2)%W,(i*93+50)%H,4+i%7,0,Math.PI*2);ctx.fill();ctx.restore();}
  }

  // ── EASTER EGG SCENES (spawn at 10 seconds = frame 600) ──
  if(pl.name==='MOON'&&BNS.timer>=600&&BNS.alive){
    drawApolloScene();
  }
  if(pl.name==='MARS'&&BNS.timer>=600&&BNS.alive){
    drawMarsColony();
  }

  // Obstacles
  for(const o of BNS.obs)drawSurfaceObsCanvas(o,pl);

  // Exhaust
  for(const p of exhaustPool){if(!p.active)continue;ctx.save();ctx.globalAlpha=p.life*.7;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}

  // Shuttle
  const isLaunching=BNS.phase==='launch';
  if(BNS.alive||isLaunching||BNS.crashTimer<25){
    ctx.save();
    if(!BNS.alive&&!isLaunching)ctx.globalAlpha=Math.max(0,1-BNS.crashTimer/25);
    const ang=isLaunching?0:Math.min(Math.max(BNS.svy*.05,-.5),.8);
    drawShuttleAt(ctx,BNS.sx,BNS.sy,ang,
      {alive:BNS.alive,bananaMulti:1,luckyTimer:0,
       wingState:p1.wingState||'both',
       lopsideAngle:p1.lopsideAngle||0,
       graceTimer:0,
       vy:BNS.svy,sweatTimer:0,nearMissTimer:0,fistTimer:0,tearY:0,tearAlpha:0,cheerTimer:0},!BNS.alive);
    drawRepairMonkey(BNS.sx,BNS.sy);
    ctx.restore();
  }

  // Particles
  for(const p of particlePool){if(!p.active)continue;ctx.save();ctx.globalAlpha=p.life;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.restore();}

  // Flash
  if(flash>.01){ctx.save();ctx.globalAlpha=flash;ctx.fillStyle=flashCol;ctx.fillRect(0,0,W,H);ctx.restore();}

  // HUD — planet name top-left, bananas top-right
  ctx.fillStyle=planetAccent(pl.name);ctx.font='bold 13px Orbitron,monospace';ctx.textAlign='left';
  ctx.fillText(pl.name,10,22);
  ctx.fillStyle='#ffcc00';ctx.textAlign='right';ctx.font='bold 13px Orbitron,monospace';
  if(pl.name==='MOON'){
    ctx.fillText('+'+BNS.bananas+'🍌',W-58,22);
  } else {
    ctx.fillText(BNS.dist.toFixed(1)+'km  +'+BNS.bananas+'🍌',W-58,22);
  }
  // Timer top-centre
  if(BNS.alive){
    const remaining=Math.max(0,Math.ceil((1800-BNS.timer)/60));
    const isUrgent=remaining<=5;
    ctx.fillStyle=isUrgent?'#ff4400':'#88eeff';
    ctx.font='bold 26px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText(remaining+'s',W/2,30);
    if(isUrgent){ctx.save();ctx.globalAlpha=.5+.5*Math.sin(frame*.4);ctx.fillStyle='#ff4400';ctx.fillText(remaining+'s',W/2,30);ctx.restore();}
  }
  // Tap hint (below timer) — only when alive on surface
  if(BNS.alive){
    ctx.fillStyle='#666';ctx.font='8px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText('TAP TO BOOST',W/2,H-10);
  } else if(BNS.phase==='launch'){
    ctx.fillStyle='#88eeff';ctx.font='bold 14px Orbitron,monospace';ctx.textAlign='center';
    ctx.fillText('🚀 LAUNCHING',W/2,H-10);
  }
}

function buildMarsCanvas(){
  marsCanvas=document.createElement('canvas');
  marsCanvas.width=240;marsCanvas.height=180;
  const c=marsCanvas.getContext('2d');
  c.save();
  c.translate(120,160);
  c.scale(1.6,1.6);
  c.translate(-120,-160);
  // Dome
  const domeX=120,domeY=158,domeR=42;
  const dg=c.createRadialGradient(domeX-10,domeY-domeR-5,5,domeX,domeY-10,domeR);
  dg.addColorStop(0,'rgba(180,220,255,.55)');
  dg.addColorStop(.7,'rgba(120,180,220,.35)');
  dg.addColorStop(1,'rgba(80,140,180,.25)');
  c.fillStyle=dg;
  c.beginPath();c.arc(domeX,domeY,domeR,Math.PI,Math.PI*2);c.fill();
  c.globalAlpha=.5;
  c.strokeStyle='#88aabb';c.lineWidth=1;
  for(let a=Math.PI;a<=Math.PI*2;a+=Math.PI/6){
    c.beginPath();c.moveTo(domeX,domeY);c.lineTo(domeX+Math.cos(a)*domeR,domeY+Math.sin(a)*domeR);c.stroke();
  }
  c.beginPath();c.arc(domeX,domeY,domeR,Math.PI,Math.PI*2);c.stroke();
  c.globalAlpha=1;
  // House
  const hx=domeX-12,hy=domeY-2;
  c.fillStyle='#ddccaa';c.fillRect(hx-12,hy-18,24,18);
  c.strokeStyle='#998866';c.lineWidth=1;c.strokeRect(hx-12,hy-18,24,18);
  c.fillStyle='#aa4422';
  c.beginPath();c.moveTo(hx-14,hy-18);c.lineTo(hx,hy-28);c.lineTo(hx+14,hy-18);c.closePath();c.fill();
  c.strokeStyle='#882200';c.stroke();
  c.fillStyle='#664422';c.fillRect(hx-3,hy-10,6,10);
  c.fillStyle='#ffeeaa';
  c.fillRect(hx-9,hy-15,5,5);c.fillRect(hx+4,hy-15,5,5);
  c.fillStyle='#666';c.fillRect(hx+6,hy-26,3,4);
  // Corn
  for(let i=0;i<5;i++){
    const cx=domeX+10+i*5;
    const cy=domeY-2;
    c.strokeStyle='#558833';c.lineWidth=1.2;
    c.beginPath();c.moveTo(cx,cy);c.lineTo(cx,cy-12);c.stroke();
    c.beginPath();c.moveTo(cx,cy-6);c.lineTo(cx-3,cy-4);c.stroke();
    c.beginPath();c.moveTo(cx,cy-9);c.lineTo(cx+3,cy-7);c.stroke();
    c.fillStyle='#ffcc44';
    c.beginPath();c.ellipse(cx+1,cy-10,1.2,2.2,0,0,Math.PI*2);c.fill();
  }
  c.restore();
}

function drawAstronaut(x,y,pose){
  ctx.save();
  ctx.translate(x,y);
  // Legs
  ctx.fillStyle='#dddddd';
  ctx.fillRect(-3,-6,2.5,6); // left leg
  ctx.fillRect(.5,-6,2.5,6); // right leg
  // Boots
  ctx.fillStyle='#666677';
  ctx.fillRect(-3.5,-1,3,2);
  ctx.fillRect(.3,-1,3,2);
  // Body (torso suit)
  ctx.fillStyle='#eeeeee';
  ctx.beginPath();ctx.roundRect(-4,-13,8,8,1.5);ctx.fill();
  ctx.strokeStyle='#aaaabb';ctx.lineWidth=.6;ctx.stroke();
  // Chest control panel
  ctx.fillStyle='#888899';ctx.fillRect(-2.5,-11,5,3);
  ctx.fillStyle='#ff4400';ctx.fillRect(-2,-10.5,1,1);
  ctx.fillStyle='#44ff44';ctx.fillRect(0,-10.5,1,1);
  // Backpack (PLSS) — peeks out from behind
  ctx.fillStyle='#cccccc';ctx.fillRect(-4.5,-13,1.5,8);
  ctx.fillRect(3,-13,1.5,8);
  // Helmet
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.arc(0,-16,4,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aaaabb';ctx.lineWidth=.7;ctx.stroke();
  // Gold visor
  ctx.fillStyle='#ddaa44';
  ctx.beginPath();ctx.ellipse(0,-16,3,2.6,0,0,Math.PI*2);ctx.fill();
  // Visor highlight
  ctx.fillStyle='#ffee88';ctx.globalAlpha=.55;
  ctx.beginPath();ctx.ellipse(-1,-17,1.2,.6,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;

  if(pose==='wave'){
    const wave=Math.sin(frame*.18)*1.5;
    ctx.fillStyle='#eeeeee';
    ctx.fillRect(3,-20,2,7); // upper arm extending up
    ctx.beginPath();ctx.arc(4+wave,-21,1.6,0,Math.PI*2);ctx.fill(); // hand
    ctx.fillRect(-5,-12,2,7); // left arm at side
  } else if(pose==='photo'){
    ctx.fillStyle='#eeeeee';
    ctx.fillRect(-5,-13,2,4);
    ctx.fillRect(3,-13,2,4);
    ctx.fillRect(-3.5,-12,1.6,3);
    ctx.fillRect(1.9,-12,1.6,3);
    // Camera body
    ctx.fillStyle='#222233';
    ctx.fillRect(-2.5,-15,5,3);
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(0,-13.5,1.2,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#88aaff';
    ctx.beginPath();ctx.arc(0,-13.5,.6,0,Math.PI*2);ctx.fill();
    // D) Brighter flash, more frequent (every 50 frames)
    if(frame%50<5){
      ctx.save();ctx.globalAlpha=.85-(frame%50)*.15;
      ctx.fillStyle='#ffffff';
      ctx.beginPath();ctx.arc(2,-14,6,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha*=.6;
      ctx.beginPath();ctx.arc(2,-14,10,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  }
  ctx.restore();
}

function drawFarmer(x,y){
  ctx.save();
  ctx.translate(x,y);
  // Legs (blue jeans)
  ctx.fillStyle='#3366aa';
  ctx.fillRect(-3,-6,2.5,6);
  ctx.fillRect(.5,-6,2.5,6);
  // Boots
  ctx.fillStyle='#553311';
  ctx.fillRect(-3.5,-1,3,2);
  ctx.fillRect(.3,-1,3,2);
  // Red shirt body
  ctx.fillStyle='#cc3322';
  ctx.beginPath();ctx.roundRect(-4,-13,8,8,1.5);ctx.fill();
  ctx.strokeStyle='#882211';ctx.lineWidth=.6;ctx.stroke();
  // Head (skin tone)
  ctx.fillStyle='#ddbb99';
  ctx.beginPath();ctx.arc(0,-16,3.2,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#aa8866';ctx.lineWidth=.5;ctx.stroke();
  // Eyes
  ctx.fillStyle='#000';
  ctx.fillRect(-1.5,-16.5,.6,.6);
  ctx.fillRect(.9,-16.5,.6,.6);
  // Smile
  ctx.strokeStyle='#553311';ctx.lineWidth=.5;
  ctx.beginPath();ctx.arc(0,-15.5,1.2,.2,Math.PI-.2);ctx.stroke();
  // Straw hat
  ctx.fillStyle='#ddbb55';
  ctx.beginPath();
  ctx.ellipse(0,-18.5,5.5,1.2,0,0,Math.PI*2);ctx.fill();
  ctx.fillRect(-2.5,-20.5,5,2.2);
  ctx.strokeStyle='#996633';ctx.lineWidth=.4;ctx.stroke();
  // Hat band
  ctx.fillStyle='#883322';ctx.fillRect(-2.5,-19,5,.6);
  // F) Wave with on/off cycle: wave for 30 frames, rest for 30
  const cycle=Math.floor(frame/30)%2;
  if(cycle===0){
    const wave=Math.sin(frame*.2)*1.5;
    // Arm raised waving
    ctx.fillStyle='#cc3322';
    ctx.fillRect(3,-19,2,6);
    ctx.fillStyle='#ddbb99';
    ctx.beginPath();ctx.arc(4+wave,-20,1.4,0,Math.PI*2);ctx.fill();
    // Other arm at side
    ctx.fillStyle='#cc3322';
    ctx.fillRect(-5,-12,2,6);
  } else {
    // Both arms relaxed at sides
    ctx.fillStyle='#cc3322';
    ctx.fillRect(-5,-12,2,6);
    ctx.fillRect(3,-12,2,6);
  }
  ctx.restore();
}

function drawAlien(x,y){

  ctx.beginPath();ctx.arc(0,-13,4.5,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.ellipse(1.5,-13,1.6,1.9,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-1.5,-12.5,.8,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(1.5,-12.5,.8,0,Math.PI*2);ctx.fill();
  // Antennae with pulsing tips
  ctx.strokeStyle='#44aa66';ctx.lineWidth=.8;
  ctx.beginPath();ctx.moveTo(-2,-16);ctx.lineTo(-3,-20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(2,-16);ctx.lineTo(3,-20);ctx.stroke();
  const pulse=.6+.4*Math.sin(frame*.12);
  ctx.fillStyle='#ffff44';ctx.globalAlpha=pulse;
  ctx.beginPath();ctx.arc(-3,-20.5,1.1,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(3,-20.5,1.1,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // Waving tentacle arm (right)
  const wave=Math.sin(frame*.15)*2;
  ctx.strokeStyle='#55bb77';ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(4,-9);
  ctx.quadraticCurveTo(8,-12+wave,10,-15+wave*.5);
  ctx.stroke();
  // Left arm down
  ctx.beginPath();ctx.moveTo(-4,-9);ctx.quadraticCurveTo(-6,-7,-5,-4);ctx.stroke();
  ctx.restore();
}

function drawApolloScene(){
  const SCENE_START=600; // frame trigger (10 seconds)
  const scrolled=(BNS.timer-SCENE_START)*BNS.speed;
  const baseX=W+200-scrolled;
  if(baseX<-400)return;
  const groundY=terrainY(BNS.terrain,BNS.tOff,baseX);

  ctx.save();
  // Scale everything 1.7x at the scene anchor
  ctx.translate(baseX,groundY);
  ctx.scale(1.7,1.7);
  ctx.translate(-baseX,-groundY);

  // ── A) LEM EXHAUST GLOW (drawn BEHIND LEM) ──
  const lemX=baseX, lemY=groundY-2;
  const glowPulse=.4+.3*Math.sin(frame*.1);
  ctx.save();
  ctx.globalAlpha=glowPulse*.6;
  const eg=ctx.createRadialGradient(lemX,lemY+4,2,lemX,lemY+12,18);
  eg.addColorStop(0,'rgba(255,180,80,.9)');
  eg.addColorStop(.5,'rgba(255,120,40,.4)');
  eg.addColorStop(1,'rgba(255,80,20,0)');
  ctx.fillStyle=eg;
  ctx.beginPath();ctx.ellipse(lemX,lemY+8,16,12,0,0,Math.PI*2);ctx.fill();
  ctx.restore();
  // Faint exhaust particles (deterministic, no array growth)
  ctx.save();
  ctx.globalAlpha=.35;
  for(let i=0;i<3;i++){
    const ph=((frame+i*30)%60)/60;
    const px=lemX+Math.sin((frame+i*40)*.15)*3;
    const py=lemY+4+ph*16;
    ctx.fillStyle=`rgba(255,${180-ph*80|0},${60-ph*30|0},${(1-ph)*.6})`;
    ctx.beginPath();ctx.arc(px,py,2-ph*1.2,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();

  // ── E) ROVER TIRE TRACKS (extending right from LEM) ──
  ctx.save();
  ctx.globalAlpha=.4;
  ctx.strokeStyle='#444455';ctx.lineWidth=1.2;
  ctx.setLineDash([3,2]);
  ctx.beginPath();
  ctx.moveTo(lemX+15,groundY-1);ctx.lineTo(lemX+90,groundY-1);
  ctx.moveTo(lemX+15,groundY+1);ctx.lineTo(lemX+90,groundY+1);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // ── LUNAR LANDER (LEM) ──
  ctx.strokeStyle='#bbbbcc';ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(lemX-22,lemY);ctx.lineTo(lemX-10,lemY-22);
  ctx.moveTo(lemX+22,lemY);ctx.lineTo(lemX+10,lemY-22);
  ctx.moveTo(lemX-15,lemY);ctx.lineTo(lemX-6,lemY-22);
  ctx.moveTo(lemX+15,lemY);ctx.lineTo(lemX+6,lemY-22);
  ctx.stroke();
  ctx.fillStyle='#888899';
  [-22,-15,15,22].forEach(dx=>{ctx.beginPath();ctx.ellipse(lemX+dx,lemY,4,2,0,0,Math.PI*2);ctx.fill();});
  // Descent stage (gold)
  ctx.fillStyle='#ddaa44';
  ctx.beginPath();
  ctx.moveTo(lemX-13,lemY-22);ctx.lineTo(lemX-16,lemY-30);
  ctx.lineTo(lemX-13,lemY-38);ctx.lineTo(lemX+13,lemY-38);
  ctx.lineTo(lemX+16,lemY-30);ctx.lineTo(lemX+13,lemY-22);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#aa7722';ctx.lineWidth=1;ctx.stroke();
  // Foil panels
  ctx.strokeStyle='#cc8833';ctx.lineWidth=.8;ctx.globalAlpha=.6;
  for(let i=-12;i<13;i+=4){ctx.beginPath();ctx.moveTo(lemX+i,lemY-37);ctx.lineTo(lemX+i,lemY-23);ctx.stroke();}
  ctx.globalAlpha=1;
  // Ascent stage (silver)
  ctx.fillStyle='#bbbbcc';
  ctx.beginPath();
  ctx.moveTo(lemX-11,lemY-38);ctx.lineTo(lemX-11,lemY-50);
  ctx.lineTo(lemX-7,lemY-54);ctx.lineTo(lemX+7,lemY-54);
  ctx.lineTo(lemX+11,lemY-50);ctx.lineTo(lemX+11,lemY-38);
  ctx.closePath();ctx.fill();
  ctx.strokeStyle='#778899';ctx.lineWidth=1;ctx.stroke();
  // Two angled windows
  ctx.fillStyle='#001133';
  ctx.beginPath();ctx.moveTo(lemX-5,lemY-50);ctx.lineTo(lemX-2,lemY-46);ctx.lineTo(lemX-5,lemY-46);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(lemX+5,lemY-50);ctx.lineTo(lemX+2,lemY-46);ctx.lineTo(lemX+5,lemY-46);ctx.closePath();ctx.fill();
  // Antenna with sphere
  ctx.strokeStyle='#aaaabb';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(lemX,lemY-54);ctx.lineTo(lemX-6,lemY-62);ctx.stroke();
  ctx.fillStyle='#ccccdd';
  ctx.beginPath();ctx.arc(lemX-6,lemY-62,3,0,Math.PI*2);ctx.fill();

  // ── FLAG ──
  const flagX=lemX+50,flagY=groundY-2;
  ctx.strokeStyle='#ddddee';ctx.lineWidth=1.4;
  ctx.beginPath();ctx.moveTo(flagX,flagY);ctx.lineTo(flagX,flagY-32);ctx.stroke();
  ctx.beginPath();ctx.moveTo(flagX,flagY-32);ctx.lineTo(flagX+18,flagY-32);ctx.stroke();
  // Flag base

function dateString(d){
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function updateDailyStreak(){
  // Migrate old "Thu Jun 05 2026" format saves to YYYY-MM-DD once
  if(lastPlayDate&&lastPlayDate.indexOf(' ')!==-1){
    const parsed=new Date(lastPlayDate);
    if(!isNaN(parsed))lastPlayDate=dateString(parsed);
  }
  const today=dateString(new Date()),yesterday=dateString(new Date(Date.now()-86400000));
  if(lastPlayDate===today)return;
  if(lastPlayDate===yesterday){dailyStreak++;}

}

// Hash a date string ("YYYY-MM-DD") to a stable index
function hashDate(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h+s.charCodeAt(i))|0;}return Math.abs(h);}

function todayString(){return dateString(new Date());}

let dailyMissionDate=LS.get('missionDate','');
let dailyMissionIdx=LS.get('missionIdx',0);
let dailyMissionProgress=LS.get('missionProgress',0);
let dailyMissionClaimed=LS.get('missionClaimed',false);

function ensureDailyMission(){
  const today=todayString();
  if(dailyMissionDate!==today){
    dailyMissionDate=today;
    dailyMissionIdx=hashDate(today)%MISSIONS.length;
    dailyMissionProgress=0;
    dailyMissionClaimed=false;
    LS.set('missionDate',dailyMissionDate);
    LS.set('missionIdx',dailyMissionIdx);
    LS.set('missionProgress',0);
    LS.set('missionClaimed',false);
  }
}

// Track per-run stats so missions can be evaluated at end of run
let runStats={
  bananas:0, wrenches:0, planets:0, lucky:0, flawlessStreak:0, bananasEarned:0
};

// Called at end of run. fs = final score.
function evaluateMission(fs){
  ensureDailyMission();
  if(dailyMissionClaimed)return false; // already done today
  const m=currentMission();
  let achieved=false;
  switch(m.tracker){
    case 'maxScore':            achieved=fs>=m.target; break;
    case 'maxBananasInRun':     achieved=runStats.bananas>=m.target; break;
    case 'maxWrenchesInRun':    achieved=runStats.wrenches>=m.target; break;
    case 'maxPlanetsInRun':     achieved=runStats.planets>=m.target; break;
    case 'maxLuckyInRun':       achieved=runStats.lucky>=m.target; break;
    case 'maxFlawlessStreak':   achieved=runStats.flawlessStreak>=m.target; break;
    case 'maxBananasEarned':         achieved=runStats.bananasEarned>=m.target; break;
  }
  // Update progress bar even if not achieved
  let progress=0;
  switch(m.tracker){
    case 'maxScore':            progress=fs; break;
    case 'maxBananasInRun':     progress=runStats.bananas; break;
    case 'maxWrenchesInRun':    progress=runStats.wrenches; break;
    case 'maxPlanetsInRun':     progress=runStats.planets; break;
    case 'maxLuckyInRun':       progress=runStats.lucky; break;
    case 'maxFlawlessStreak':   progress=runStats.flawlessStreak; break;
    case 'maxBananasEarned':         progress=runStats.bananasEarned; break;
  }
  if(progress>dailyMissionProgress){
    dailyMissionProgress=progress;
    LS.set('missionProgress',dailyMissionProgress);
  }
  if(achieved){
    dailyMissionClaimed=true;
    bananas+=m.reward;
    LS.set('coins',bananas);
    LS.set('missionClaimed',true);
  }
  return achieved;
}

// Debris fraction: 1.0 near Earth (score 0), 0 in deep space (score 80+)
function debrisFraction(sc){return Math.max(0,1-sc/80);}
function mkRock(n,r){
  const pts=[];
  for(let i=0;i<n;i++){const a=(i/n)*Math.PI*2,rv=r*(.62+Math.random()*.52);pts.push([Math.cos(a)*rv,Math.sin(a)*rv]);}
  return pts;
}
// Satellite types: 0=ISS-style, 1=Sputnik, 2=weather, 3=cubesat, 4=rock
function randSatType(sc){
  const df=debrisFraction(sc);
  if(Math.random()<df){
    // debris zone — mix of sat types
    return Math.floor(Math.random()*4);
  }
  return 4; // rock
}
function spawnObs(forceLucky=false){

  const botR=botSat===0?38:botSat===1?18:botSat===2?24:botSat===3?16:26+Math.random()*14;

function getTH(p){
  const g=p.gap||gapSize;
  let t=p.topH,b=p.topH+g;
  if(p.type==='moving'){t=p.topH+Math.sin(p.movePhase)*p.moveAmp;b=t+g;}
  if(p.type==='closing'){const cl=Math.min(p.closePhase*30,g/2-45);t=p.topH+cl;b=p.topH+g-cl;}
  return[t,b];
}
function checkWallHit(pl){return pl.y-hitboxR()<0||pl.y+hitboxR()>H;}
function checkHit(px,py,pip){
  const br=hitboxR();
  if(pip.type==='cluster'&&pip.cluster){
    for(const ck of pip.cluster){
      const cx=pip.x+ck.ox,cy=ck.oy;
      if(cx<-40||cx>W+40)continue;
      const dx=px-cx,dy=py-cy;
      if(dx*dx+dy*dy<(br+ck.r)*(br+ck.r))return true;
    }
    return false;
  }
  const[tH,bY]=getTH(pip);
  // Top rock circle hit
  const dxt=px-pip.x,dyt=py-tH;
  if(dxt*dxt+dyt*dyt<(br+pip.topR)*(br+pip.topR))return true;
  // Bottom rock circle hit
  const dxb=px-pip.x,dyb=py-bY;
  if(dxb*dxb+dyb*dyb<(br+pip.botR)*(br+pip.botR))return true;
  return false;
}
function nearPipe(px,py){
  for(const p of pipes){
    if(Math.abs(px-p.x)<80){
      const[tH,bY]=getTH(p);
      const dt=Math.hypot(px-p.x,py-tH),db=Math.hypot(px-p.x,py-bY);
      if(dt<p.topR+50||db<p.botR+50)return true;
    }
  }
  return false;
}

function updateHullUI(){
  const max=1+upgrades.bounce;

  // Only show the meter during the gauntlet — bonus and BH have their own UIs
  if(state!=='playing'){hullEl.style.opacity='0';return;}
  hullEl.style.opacity='1';
  const charges=Math.max(0,p1.bounceCharges||0);
  // Bar fill: capped at 100% — over-max indicated separately
  const pct=Math.min(100,(charges/max)*100);
  const fill=document.getElementById('hullFill');
  if(fill){
    fill.style.width=pct+'%';
    fill.classList.remove('warn','crit','shield');
    if(charges>max)fill.classList.add('shield');
    else if(charges<=0)fill.classList.add('crit');
    else if(charges===1)fill.classList.add('warn');
  }
  // Build segment dividers based on max charges
  const segs=document.getElementById('hullSegments');
  if(segs&&segs.children.length!==max){
    segs.innerHTML='';
    for(let i=0;i<max;i++){const d=document.createElement('div');d.className='hull-seg';segs.appendChild(d);}
  }
  // Label — show state with icon for colorblind accessibility
  const lbl=document.getElementById('hullLabel');
  if(lbl){
    let icon='';
    if(charges>max)icon=' <span style="color:#ffcc00">⚡ SHIELDED</span>';
    else if(charges<=0)icon=' <span style="color:#ff4444">⚠ CRITICAL</span>';
    else if(charges===1&&max>1)icon=' <span style="color:#ffaa00">! WARNING</span>';
    lbl.innerHTML='HULL '+charges+' / '+max+icon;
  }
}

let blackholeTriggered=false;

function blackholeTap(){

  if(bhState.stage===0){bhState.stage=1;bhState.timer=0;return;}
  if(bhState.stage===1){
    const dx=bhState.shipX-BH.x,dy=bhState.shipY-BH.y;
    const d=Math.hypot(dx,dy);
    if(d>0.5){
      const thrust=1.8;
      bhState.vx+=(dx/d)*thrust;
      bhState.vy+=(dy/d)*thrust;
    }
    sndThrust();return;
  }
  if(bhState.stage===3){
    const pct=bhState.releasePower;
    const inZone=pct>=42&&pct<=58;
    if(inZone){
      bhState.greenHits++;
      tone(700+bhState.greenHits*60,.08,'sine',.2);
      vibrate(25);
      if(bhState.greenHits>=BH_HITS_NEEDED){bhState.releaseGood=true;bhState.stage=4;bhState.timer=0;}
    } else {
      bhState.orbitRadius=Math.max(BH.r+30,bhState.orbitRadius-6);
      tone(180,.15,'sawtooth',.18);
      vibrate(40);
      if(bhState.orbitRadius<=BH.r+30){bhState.releaseGood=false;bhState.stage=4;bhState.timer=0;}
    }
    return;
  }
  if(bhState.stage===5){
    if(bhState.releaseGood){

    } else {

    }
    state='resume';
    p1.y=H/2;p1.vy=0;pipes=[];spawnObs();
    updateHullUI();

  }

function updateBlackhole(){
  bhState.timer++;
  for(const s of bhState.warpStars){
    const dx=BH.x-s.baseX,dy=BH.y-s.baseY;
    const d=Math.hypot(dx,dy);
    const pull=Math.min(1,80/(d+10));
    s.x=s.baseX+dx*pull*.15;s.y=s.baseY+dy*pull*.15;
  }
  for(const p of bhDisk)p.a+=p.sp;

  if(bhState.stage===-1){
    // Intro — slow disk fade-in while player reads
    bhState.cinAlpha=Math.min(.7,bhState.timer/180);
    // Don't auto-advance; wait for tap
  }
  else if(bhState.stage===0){
    bhState.cinAlpha=Math.min(1,bhState.cinAlpha+.012);
    if(bhState.timer>180){bhState.stage=1;bhState.timer=0;}
  }
  else if(bhState.stage===1){
    bhState.cinAlpha=1;
    const dx=BH.x-bhState.shipX,dy=BH.y-bhState.shipY;
    const d=Math.hypot(dx,dy);
    if(d>0.5){
      const pullStrength=0.12;
      bhState.vx+=(dx/d)*pullStrength*(160/Math.max(d,40));
      bhState.vy+=(dy/d)*pullStrength*(160/Math.max(d,40));
    }
    bhState.vx*=.992;bhState.vy*=.992;
    bhState.shipX+=bhState.vx;bhState.shipY+=bhState.vy;
    if(Math.hypot(bhState.vx,bhState.vy)>.5)bhState.angle=Math.atan2(bhState.vy,bhState.vx);
    if(d>=bhState.orbitTargetR-15&&d<=bhState.orbitTargetR+25&&Math.hypot(bhState.vx,bhState.vy)<7){
      bhState.stage=2;bhState.timer=0;
      bhState.orbitAngle=Math.atan2(bhState.shipY-BH.y,bhState.shipX-BH.x);
      bhState.orbitRadius=Math.hypot(bhState.shipX-BH.x,bhState.shipY-BH.y);
      bhState.orbitSpeed=.04;bhState.orbitRotations=0;
    }
    if(d<BH.r+8){bhState.releaseGood=false;bhState.stage=4;bhState.timer=0;}
  }
  else if(bhState.stage===2){
    bhState.orbitAngle+=bhState.orbitSpeed;
    bhState.orbitSpeed=Math.min(.09,bhState.orbitSpeed+.0005);
    bhState.shipX=BH.x+Math.cos(bhState.orbitAngle)*bhState.orbitRadius;
    bhState.shipY=BH.y+Math.sin(bhState.orbitAngle)*bhState.orbitRadius;
    bhState.angle=bhState.orbitAngle+Math.PI/2;
    if(bhState.orbitAngle>Math.PI*1.5)bhState.orbitRotations++;
    if(bhState.orbitRotations>=2&&bhState.timer>120){bhState.stage=3;bhState.timer=0;bhState.greenHits=0;}
  }
  else if(bhState.stage===3){
    bhState.orbitAngle+=bhState.orbitSpeed;
    bhState.shipX=BH.x+Math.cos(bhState.orbitAngle)*bhState.orbitRadius;
    bhState.shipY=BH.y+Math.sin(bhState.orbitAngle)*bhState.orbitRadius;
    bhState.angle=bhState.orbitAngle+Math.PI/2;
    // Sweep period shortens for the last 3 hits — adds tension
    const remaining=BH_HITS_NEEDED-bhState.greenHits;
    const period=remaining<=3?50:80;
    const cycle=(bhState.timer%period)/period;
    bhState.releasePower=cycle*100;
  }
  else if(bhState.stage===4){
    if(bhState.releaseGood){
      const tangent=bhState.orbitAngle+Math.PI/2;
      if(bhState.timer===1){bhState.vx=Math.cos(tangent)*14;bhState.vy=Math.sin(tangent)*14;}
      bhState.shipX+=bhState.vx;bhState.shipY+=bhState.vy;
      bhState.angle=Math.atan2(bhState.vy,bhState.vx);
      if(bhState.shipX>W+80||bhState.shipX<-80||bhState.shipY<-80||bhState.shipY>H+80){
        bhState.stage=5;bhState.timer=0;
      }
    } else {
      const dx=BH.x-bhState.shipX,dy=BH.y-bhState.shipY;
      const d=Math.hypot(dx,dy);
      bhState.orbitAngle+=.15;
      const pullR=Math.max(0,d-2);
      bhState.shipX=BH.x+Math.cos(bhState.orbitAngle)*pullR;
      bhState.shipY=BH.y+Math.sin(bhState.orbitAngle)*pullR;
      bhState.angle+=.2;
      if(d<5){bhState.stage=5;bhState.timer=0;}
    }
  }
}

function drawBlackhole(){
  ctx.fillStyle='#000';ctx.fillRect(0,0,W,H);
  for(const s of bhState.warpStars){
    ctx.save();ctx.globalAlpha=.4+s.b*.6;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }
  if(bhState.cinAlpha>0){
    ctx.save();ctx.globalAlpha=bhState.cinAlpha;
    const glow=ctx.createRadialGradient(BH.x,BH.y,BH.r,BH.x,BH.y,BH.r*4);
    glow.addColorStop(0,'rgba(255,140,40,.5)');
    glow.addColorStop(.3,'rgba(120,40,80,.3)');
    glow.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=glow;
    ctx.beginPath();ctx.arc(BH.x,BH.y,BH.r*4,0,Math.PI*2);ctx.fill();
    for(const p of bhDisk){
      const px=BH.x+Math.cos(p.a)*p.d;
      const py=BH.y+Math.sin(p.a)*p.d*.45;
      ctx.fillStyle=p.col;ctx.globalAlpha=bhState.cinAlpha*.85;
      ctx.beginPath();ctx.arc(px,py,p.size,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=bhState.cinAlpha*.6;
    ctx.strokeStyle='#ff8844';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.arc(BH.x,BH.y,BH.r+8,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=bhState.cinAlpha;
    ctx.fillStyle='#000';

    const tx=bhState.shipX+Math.cos(tangent)*60;

  if(bhState.stage===4&&!bhState.releaseGood){

    ctx.lineTo(ix-4,my-2);
    ctx.lineTo(ix+4,my-2);
    ctx.closePath();ctx.fill();
  }

}

// ── REPAIR ANIMATION ──────────────────────────────────────────────
// 4 second sequence (240 frames at 60fps) running alongside normal flight.
// Phases: climbout(30) → walking(30) → fixing(120) → returning(60)
const REPAIR_PHASES={climbout:30,walking:30,fixing:120,returning:60};
let repair={active:false,phase:'idle',timer:0,targetSide:'left',totalTimer:0};

function startRepair(){
  // Decide which wing needs fixing — prefer the missing one
  let target='left';
  if(p1.wingState==='left')target='right';        // right is missing
  else if(p1.wingState==='right')target='left';   // left is missing
  else if(p1.wingState==='none')target='left';    // start with left
  else target=Math.random()<.5?'left':'right';
  repair.active=true;repair.phase='climbout';repair.timer=0;
  repair.targetSide=target;repair.totalTimer=0;
  showStreak('🐒 REPAIRING...');
}

function updateRepair(){
  if(!repair.active||!p1.alive)return;
  repair.timer++;repair.totalTimer++;
  const limit=REPAIR_PHASES[repair.phase];
  // Use the correct shuttle anchor: planet bonus uses BNS.sx/sy, gauntlet uses PX_GAUNTLET/p1.y
  const onPlanet=(state==='bonus'||state==='approach');
  const anchorX=onPlanet?BNS.sx:PX_GAUNTLET;
  const anchorY=onPlanet?BNS.sy:p1.y;
  if(repair.phase==='fixing'){
    // Spawn sparks at wing tip every few frames
    if(repair.timer%5===0){
      const dir=repair.targetSide==='left'?-1:1;
      const wingTipX=anchorX+dir*28,wingTipY=anchorY+12;
      for(let i=0;i<3;i++){
        const pp=getParticle();if(!pp)continue;
        const a=Math.random()*Math.PI*2,sp=1+Math.random()*2.5;
        pp.active=true;pp.x=wingTipX;pp.y=wingTipY;
        pp.vx=Math.cos(a)*sp;pp.vy=Math.sin(a)*sp-.5;
        pp.life=1;pp.col=Math.random()<.5?'#ffee00':'#ff8844';pp.r=2;
      }
      // Halfway through fixing: pop the wing back
      if(repair.timer===Math.floor(limit/2)){vibrate(12);
        if(p1.wingState==='none')p1.wingState=repair.targetSide;
        else if(p1.wingState==='left'&&repair.targetSide==='right')p1.wingState='both';
        else if(p1.wingState==='right'&&repair.targetSide==='left')p1.wingState='both';
        else if(p1.wingState!=='both')p1.wingState='both';
        p1.lopsideAngle=0;
        spawnP(anchorX+(repair.targetSide==='left'?-28:28),anchorY+12,'#44ddff',14);
        spawnP(anchorX+(repair.targetSide==='left'?-28:28),anchorY+12,'#ffffff',6);
        sndBounce();
      }
      tone(700+Math.random()*500,.03,'square',.06);
    }
  }
  if(repair.timer>=limit){
    // Move to next phase
    repair.timer=0;
    if(repair.phase==='climbout')repair.phase='walking';
    else if(repair.phase==='walking')repair.phase='fixing';
    else if(repair.phase==='fixing'){
      repair.phase='returning';
      // Refill bounce charges at end of fix
      const max=1+upgrades.bounce;
      p1.bounceCharges=p1.bounceCharges+2;
      updateHullUI();
    }
    else if(repair.phase==='returning'){
      repair.active=false;repair.phase='idle';
      // Full-restore mode: if a wing is still missing, start another repair pass
      if(repair.fullRestore&&p1.wingState!=='both'&&p1.alive){
        startRepair();
        repair.fullRestore=true; // re-arm after startRepair resets it
      } else {
        repair.fullRestore=false;
        // Ensure at least max charges, but don't reduce over-max
        const max=1+upgrades.bounce;
        if(p1.bounceCharges<max)p1.bounceCharges=max;
        updateHullUI();
        showStreak('🔧 FULLY REPAIRED!');
      }
    }
  }
}

// Draw the tiny repair monkey on the shuttle (called from main draw, AFTER the shuttle is drawn)
const PX_GAUNTLET=88;
function drawRepairMonkey(shuttleX,shuttleY){
  if(!repair.active)return;
  const dir=repair.targetSide==='left'?-1:1;
  const sx=shuttleX, sy=shuttleY;
  let mx=sx, my=sy-12;
  // Bob with shuttle motion
  const bob=Math.sin(frame*.18)*.8;
  if(repair.phase==='climbout'){
    // Emerge from cockpit — slide up and slightly outward
    const t=repair.timer/REPAIR_PHASES.climbout;
    mx=sx+dir*4*t;
    my=sy-14-Math.sin(t*Math.PI)*4;
  } else if(repair.phase==='walking'){
    // Walk along hull toward wing tip
    const t=repair.timer/REPAIR_PHASES.walking;
    mx=sx+dir*(4+(28-4)*t);
    my=sy+8+bob;
  } else if(repair.phase==='fixing'){
    // Stand at wing tip
    mx=sx+dir*28;
    my=sy+12+Math.sin(frame*.25)*1.5;
  } else if(repair.phase==='returning'){
    // Walk back to cockpit
    const t=repair.timer/REPAIR_PHASES.returning;
    mx=sx+dir*(28-(28-4)*t);
    my=sy+(8-(8+12)*Math.min(1,t*1.3))+bob;
  }
  // Tiny monkey body
  ctx.save();
  ctx.translate(mx,my);
  // Body
  ctx.fillStyle='#aa6633';
  ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();
  // Head
  ctx.fillStyle='#aa6633';
  ctx.beginPath();ctx.arc(0,-4,3,0,Math.PI*2);ctx.fill();
  // Face highlight
  ctx.fillStyle='#cc9966';
  ctx.beginPath();ctx.ellipse(0,-3.5,2,1.5,0,0,Math.PI*2);ctx.fill();
  // Eyes — two tiny dots
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-1,-4,.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(1,-4,.5,0,Math.PI*2);ctx.fill();
  // Tail (curls behind)
  ctx.strokeStyle='#aa6633';ctx.lineWidth=1.4;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(0,2);ctx.quadraticCurveTo(-dir*4,4,-dir*5,1);ctx.stroke();
  // Wrench in hand (during walking and fixing)
  if(repair.phase==='walking'||repair.phase==='fixing'){
    ctx.save();ctx.translate(dir*3,0);ctx.rotate(repair.phase==='fixing'?Math.sin(frame*.4)*.5:.2);
    ctx.fillStyle='#ccddee';ctx.fillRect(-1,-3,2,5);
    ctx.fillStyle='#88aacc';ctx.fillRect(-2,-4,4,2);
    ctx.restore();
  }
  ctx.restore();
}

// Map a pointer event to 400x600 canvas coords (robust to CSS transform scale)
function evtToCanvas(e){
  const r=C.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*W, y:(e.clientY-r.top)/r.height*H};
}
function handlePauseOverlayTap(e){
  if(pauseMode!=='paused')return true; // countdown: ignore taps
  const p=evtToCanvas(e);
  const rz=PAUSE_RESUME_ZONE,qz=PAUSE_QUIT_ZONE;
  if(p.x>=rz.x&&p.x<=rz.x+rz.w&&p.y>=rz.y&&p.y<=rz.y+rz.h)startResumeCountdown();
  else if(p.x>=qz.x&&p.x<=qz.x+qz.w&&p.y>=qz.y&&p.y<=qz.y+qz.h)quitToMenu();
  return true;
}

// ── BOUNCE ───────────────────────────────────────────────────────
function tryBounce(pl,px,fromPipe=false){
  const charges=pl.bounceCharges||0;if(charges<=0)return false;
  const br=hitboxR();const hitTop=pl.y-br<0;const hitBot=pl.y+br>H;
  if(!fromPipe&&!hitTop&&!hitBot)return false;
  if(hitTop){pl.y=br+2;pl.vy=Math.abs(pl.vy)*0.75+1;}
  else if(hitBot){pl.y=H-br-2;pl.vy=-(Math.abs(pl.vy)*0.75+1);}
  else{pl.vy=-pl.vy*0.8;if(Math.abs(pl.vy)<2)pl.vy=pl.vy<0?-2:2;}
  pl.bounceCharges=charges-1;pl.graceTimer=30;
  const [c1,c2]=bounceColors();flash=0.4;flashCol=c1;shake=10;
  spawnP(px,pl.y,c1,12);spawnP(px,pl.y,c2,6);
  const snapSide=pl.wingState==='both'?(Math.random()<.5?'left':'right'):(pl.wingState==='left'?'right':'left');
  if(pl.wingState==='both'){pl.wingState=snapSide==='left'?'right':'left';}else if(pl.wingState!=='none'){pl.wingState='none';}
  pl.lopsideAngle=(snapSide==='left'?1:-1)*(pl.wingState==='none'?.15:.07);
  spawnWingDebris(px,pl.y,snapSide);sndBounce();sndWingSnap();vibrate([20,30,20]);
  showStreak('HULL BOUNCE!');
  updateHullUI();
  // Auto-repair: triggers at 1 charge remaining (or 0 if max is 1)
  const maxC=1+upgrades.bounce;
  const triggerAt=maxC>1?1:0;
  if(pl.bounceCharges<=triggerAt&&autoRepairCharges>0&&!repair.active){
    autoRepairCharges--;saveBoosts();
    triggerAutoRepair(px,pl.y);
  }
  return true;
}

function triggerAutoRepair(px,py){
  // Visual + audio cue immediately
  spawnP(px,py,'#44ddff',24);spawnP(px,py,'#ffffff',12);
  flash=.5;flashCol='#44ddff';
  sndUpgrade();
  showStreak('🔧 AUTO-REPAIR ACTIVATED!');
  // Force "both wings need fixing" so the animation does a full repair pass
  // The startRepair function picks a side; we'll force both by chaining repairs
  // Easiest: just call startRepair() — it will fix one side. After that completes, 
  // if the other is still missing, trigger another repair pass automatically.
  startRepair();
  // Mark this as an auto-repair that should fully restore to both wings
  repair.fullRestore=true;
}

function scoreP(pl,isLucky){

  const bonusBananas=upgrades.coinbonus;const rawBananas=baseBananas+bonusBananas;
  pl.score+=baseBananas;bananasRun+=rawBananas;
  runStats.flawlessStreak++;

  if(pl.luckyTimer>0)pl.luckyTimer--;
  pl.fistTimer=30;playBananaSound();

  if(pl.streak===10){pl.cheerTimer=60;sndCheer();showStreak('10 STREAK! OOH OOH!');}
  else if(pl.streak%5===0)showStreak(pl.streak+' STREAK!');
  if(pl.bananaMulti>1&&!isLucky)showStreak('POWER BANANA x2!');
  sndScore();spawnScorePop(88,pl.y);
  s1El.textContent=fmtN(pl.score);s1El.style.transform='scale(1.3)';setTimeout(()=>s1El.style.transform='',140);
  const sc=p1.score;
  speed=6.0+Math.floor(sc/25)*.3;gapSize=Math.max(150,220-sc*1.8);
  if(luckyPipeCountdown>0)luckyPipeCountdown--;
  if(isLucky)runStats.lucky++;
  // Spawn repair wrench at threshold — pin to a far-future pipe's gap centre
  if(p1.score>=nextWrenchScore){
    // Find the rightmost pipe; spawn the wrench off-screen to the right of it
    let furthestPipe=null;
    for(const p of pipes){if(!furthestPipe||p.x>furthestPipe.x)furthestPipe=p;}
    // Always spawn off-screen so the wrench floats in like a normal obstacle
    const wx=W+80;
    let wy;
    if(furthestPipe){
      const[tH,bY]=getTH(furthestPipe);
      wy=(tH+bY)/2; // initial position at anchor's gap centre
    } else {
      wy=H/2;
    }
    wrenches.push({
      x:wx, y:wy,
      anchorPipe:furthestPipe, // track this pipe so y stays in its gap
      bob:Math.random()*Math.PI*2,
      collected:false,collectedTimer:0,rot:0
    });
    nextWrenchScore=p1.score+20+Math.floor(Math.random()*11);
    teachTip('wrench','🔧 CATCH IT — REPAIRS YOUR WINGS!');
  }
  // Black hole at score 500 (once per run)
  if(p1.alive&&p1.score>=500&&!blackholeTriggered){
    setTimeout(()=>{if(state==='playing')startBlackhole();},400);
  }
  // Planet bonus trigger (only if planets remain)
  if(p1.alive&&planetIdx<PLANET_SEQ.length&&p1.score>=nextTriggerScore()){
    setTimeout(()=>{if(state==='playing')startBonus(PLANET_SEQ[planetIdx]);},400);
  }
}

function killP(pl,px,col){
  pl.alive=false;pl.tearY=-14;pl.tearAlpha=1;vibrate([40,60,80]);
  playDeathSound();shake=18;flash=.55;flashCol='#ff4400';
  spawnDebris(px,pl.y);spawnP(px,pl.y,col,14);spawnP(px,pl.y,'#ffcc00',8);spawnP(px,pl.y,'#aabbcc',5);
}

function endGame(){
  
  totalRuns++;LS.set('runs',totalRuns);
  const baseBananas=bananasRun;
  const dm=dailyMultiplier();
  const afterDaily=Math.round(baseBananas*dm);
  const finalBananas=hasBananaDoubler()?Math.round(afterDaily*2):afterDaily;
  bananas+=finalBananas;LS.set('coins',bananas);
  const fs=p1.score;
  if(fs>hiScore){hiScore=fs;LS.set('hi',hiScore);}
  const missionWon=evaluateMission(fs);
  state='dead';setTimeout(()=>showDead(finalBananas,baseBananas,dm,afterDaily,missionWon),500);
}

// ── UPDATE ───────────────────────────────────────────────────────
function update(){
  frame++;if(state!=='playing')return;

  const PX=88;
  const phys=(pl,col)=>{
    if(!pl.alive)return;
    pl.vy+=.24;if(pl.lopsideAngle!==0)pl.vy+=pl.lopsideAngle*.4;pl.y+=pl.vy;
    if(pl.cheerTimer>0)pl.cheerTimer--;if(pl.fistTimer>0)pl.fistTimer--;
    if(pl.sweatTimer>0)pl.sweatTimer--;if(pl.nearMissTimer>0)pl.nearMissTimer--;
    if(pl.graceTimer>0)pl.graceTimer--;
    if(pl.tearAlpha>0){pl.tearY+=.8;pl.tearAlpha-=.02;}
    if(nearPipe(PX,pl.y))pl.sweatTimer=Math.max(pl.sweatTimer,18);
    if(pl.bananaTimer>0){pl.bananaTimer--;if(pl.bananaTimer===0){pl.bananaMulti=1;puBar.style.opacity='0';}}
    spawnEx(PX,pl.y+22);
    if(checkWallHit(pl)){if(!tryBounce(pl,PX))killP(pl,PX,col);}
  };
  phys(p1,'#ff6600');
  for(const s of stars){s.x-=s.spd;if(s.x<0)s.x=W;}
  let rightmostX=-9999;for(const p of pipes)if(p.x>rightmostX)rightmostX=p.x;
  const pi=Math.max(75,108-p1.score*2);
  if(frame%Math.floor(pi)===0&&(rightmostX<0||rightmostX<W-MIN_PIPE_SPACING)){const lucky=luckyPipeCountdown<=0;spawnObs(lucky);if(lucky)luckyPipeCountdown=8+Math.floor(Math.random()*5);}
  for(let i=pipes.length-1;i>=0;i--){
    const p=pipes[i];p.x-=speed;p.movePhase+=p.moveSpeed;
    if(p.type==='closing'){p.closePhase+=p.closeDir*.008;if(p.closePhase>1||p.closePhase<0)p.closeDir*=-1;}
    if(p.x<-120){pipes.splice(i,1);continue;}
    // Lucky gates: track whether the player crosses BETWEEN the satellites.
    // Over/under disqualifies the bonus; bouncing through the gap does not.
    if(p.isLucky&&!p.scored&&Math.abs(p.x-PX)<=Math.max(p.topR||30,p.botR||30)+10){
      const[lt,lb]=getTH(p);
      if(p1.y<lt||p1.y>lb)p.outOfBand=true;
    }
    if(!p.scored&&p.x+(p.topR||30)+8<PX){p.scored=true;if(p1.alive)scoreP(p1,p.isLucky&&!p.outOfBand);}
    if(p1.alive&&p1.graceTimer===0&&checkHit(PX,p1.y,p)){if(!tryBounce(p1,PX,true))killP(p1,PX,'#ff6600');}

  }
  // near miss sparks
  for(const p of pipes){if(Math.abs(PX-p.x)<50&&p1.alive){const[t,b]=getTH(p);if(p1.y-t<30||b-p1.y<30){if(!p1.nearMissTimer){const[c1]=nearMissCol();spawnP(PX,p1.y,c1,4);}p1.nearMissTimer=22;}}}
  const mag=upgrades.magnet*12;
  for(let i=powerBananas.length-1;i>=0;i--){
    const b=powerBananas[i];b.x-=speed;
    if(b.collected){b.collectedTimer++;if(b.collectedTimer>20){powerBananas.splice(i,1);continue;}continue;}
    if(b.x<-30){powerBananas.splice(i,1);continue;}
    if(mag>0&&p1.alive){const dx=PX-b.x,dy=p1.y-(b.y+Math.sin(frame*.08+b.bob)*5);if(dx*dx+dy*dy<(80+mag)*(80+mag)){b.x+=(PX-b.x)*.05;}}
    const colB=(pl)=>{if(!pl.alive)return;const dy=pl.y-(b.y+Math.sin(frame*.08+b.bob)*5);if((PX-b.x)*(PX-b.x)+dy*dy<(22+mag*.3)*(22+mag*.3)){b.collected=true;sndBanana();pl.bananaMulti=2;pl.bananaTimer=300;puBar.style.opacity='1';puInner.style.width='100%';spawnBananaFX(b.x,b.y);showStreak('POWER BANANA x2!');}};
    colB(p1);
  }
  if(p1.bananaTimer>0)puInner.style.width=(p1.bananaTimer/300*100)+'%';
  updateRepair();
  // Update wrenches
  for(let i=wrenches.length-1;i>=0;i--){
    const w=wrenches[i];w.x-=speed;w.rot+=.05;
    // Track anchor pipe — keep wrench in the centre of its gap as the pipe scrolls
    if(w.anchorPipe&&pipes.includes(w.anchorPipe)){
      const[tH,bY]=getTH(w.anchorPipe);
      w.y=(tH+bY)/2;
    }
    if(w.collected){w.collectedTimer++;if(w.collectedTimer>20){wrenches.splice(i,1);continue;}continue;}
    if(w.x<-30){wrenches.splice(i,1);continue;}
    if(p1.alive){
      const dx=PX-w.x,dy=p1.y-(w.y+Math.sin(frame*.08+w.bob)*5);
      if(dx*dx+dy*dy<90*90){
        w.collected=true;
        runStats.wrenches++;
        startRepair();
        sndUpgrade();vibrate(30);spawnP(w.x,w.y,'#44ddff',20);spawnP(w.x,w.y,'#ffffff',10);
      }
    }
  }
  for(const p of particlePool){if(!p.active)continue;p.x+=p.vx;p.y+=p.vy;p.vy+=.14;p.life-=.03;if(p.life<=0)p.active=false;}
  for(const p of exhaustPool){if(!p.active)continue;p.x+=p.vx;p.y+=p.vy;p.life-=.07;p.r*=.92;if(p.life<=0)p.active=false;}
  for(let i=debris.length-1;i>=0;i--){const d=debris[i];d.x+=d.vx;d.y+=d.vy;d.vy+=.18;d.rot+=d.rotSpd;d.life-=.018;if(d.life<=0)debris.splice(i,1);}
  if(shake>0)shake*=.8;if(flash>0)flash*=.82;
  if(!p1.alive)endGame();
}
