    c.fillStyle='#99aabb';c.fillRect(-9,-6,18,12);
    c.strokeStyle='#778899';c.lineWidth=2;
    c.beginPath();c.moveTo(-32,0);c.lineTo(32,0);c.stroke();
    c.fillStyle='#1a3355';c.fillRect(-32,-10,12,20);c.fillRect(20,-10,12,20);
    return;
  }
  if(satType===1){
    // Sputnik — sphere + 2 antennas
    c.fillStyle='#aabbcc';c.beginPath();c.arc(0,0,r,0,Math.PI*2);c.fill();
    c.strokeStyle='#778899';c.lineWidth=1.2;
    c.beginPath();c.moveTo(-r,0);c.lineTo(-r-18,8);c.moveTo(r,0);c.lineTo(r+18,-8);c.stroke();
    return;
  }
  if(satType===2){
    // Weather sat — boxy body + one large solar panel + dish
    c.fillStyle='#8899aa';c.beginPath();c.roundRect(-10,-8,20,16,2);c.fill();
    c.strokeStyle='#aabbcc';c.lineWidth=1;c.stroke();
    // Single solar panel to the right
    c.fillStyle='#1a3355';c.beginPath();c.roundRect(12,-10,22,20,1);c.fill();
    c.strokeStyle='#2255aa';c.lineWidth=.8;c.stroke();
    c.save();c.globalAlpha=.35;c.strokeStyle='#4477cc';c.lineWidth=.5;
    c.beginPath();c.moveTo(12,0);c.lineTo(34,0);c.moveTo(23,-10);c.lineTo(23,10);c.stroke();
    c.restore();
    c.strokeStyle='#99aabb';c.lineWidth=1.5;
    c.beginPath();c.moveTo(-18,-8);c.lineTo(-14,0);c.lineTo(-10,-8);c.stroke();
    return;
  }
  if(satType===3){
    // CubeSat — simple cube with tiny panels
    c.fillStyle='#667788';c.beginPath();c.roundRect(-r,-r,r*2,r*2,2);c.fill();
    c.strokeStyle='#99aacc';c.lineWidth=1.2;c.stroke();
    // Mini solar panels on sides
    c.fillStyle='#1a2233';
    c.beginPath();c.roundRect(-r-8,-r*.4,8,r*.8,1);c.fill();
    c.beginPath();c.roundRect(r,-r*.4,8,r*.8,1);c.fill();
    c.strokeStyle='#2244aa';c.lineWidth=.5;
    c.strokeRect(-r-8,-r*.4,8,r*.8);c.strokeRect(r,-r*.4,8,r*.8);
    // Label dot
    c.fillStyle='#aabbff';c.beginPath();c.arc(0,0,2.5,0,Math.PI*2);c.fill();
    return;
  }
}

function drawObs(p){
  const[tH,bY]=getTH(p);
  p.rot1+=p.rs1;p.rot2+=p.rs2;
  if(p.isLucky){p.luckyPulse=(p.luckyPulse||0)+.12;}

  if(p.type==='cluster'&&p.cluster){
    for(const ck of p.cluster){
      ck.rot+=ck.rs;
      ctx.save();ctx.translate(p.x+ck.ox,ck.oy);ctx.rotate(ck.rot);
      if(ck.sat===4){
        ctx.fillStyle='#3d5060';ctx.beginPath();
        for(let i=0;i<7;i++){const a=(i/7)*Math.PI*2,rv=ck.r*(.7+Math.sin(i*2.1+ck.rot)*.3);i===0?ctx.moveTo(Math.cos(a)*rv,Math.sin(a)*rv):ctx.lineTo(Math.cos(a)*rv,Math.sin(a)*rv);}
        ctx.closePath();ctx.fill();ctx.strokeStyle='#607080';ctx.lineWidth=1;ctx.stroke();
      } else {
        drawSatellite(ctx,ck.sat,ck.r,null);
      }
      ctx.restore();
    }
    return;
  }

  function drawOne(cx,cy,satType,pts,rot,r){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);
    if(p.isLucky){
      // Outer huge gold halo
      ctx.save();ctx.globalAlpha=.55+.35*Math.sin(p.luckyPulse);
      ctx.fillStyle='#ffdd00';
      ctx.beginPath();ctx.arc(0,0,r+32,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Mid bright halo
      ctx.save();ctx.globalAlpha=.7;
      ctx.fillStyle='#ffee44';
      ctx.beginPath();ctx.arc(0,0,r+18,0,Math.PI*2);ctx.fill();
      ctx.restore();
      // Inner ring
      ctx.save();ctx.globalAlpha=.9+.1*Math.sin(p.luckyPulse);
      ctx.strokeStyle='#ffffaa';ctx.lineWidth=3.5;
      ctx.beginPath();ctx.arc(0,0,r+8,0,Math.PI*2);ctx.stroke();
      ctx.restore();
    }
    drawSatellite(ctx,satType,r,pts);
    if(p.isLucky){
      // Solid gold overlay — the obstacle becomes a gold nugget
      ctx.save();ctx.globalAlpha=.85;ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.fill();ctx.restore();
      // Bright outline
      ctx.save();ctx.strokeStyle='#fff8cc';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(0,0,r,0,Math.PI*2);ctx.stroke();ctx.restore();
      // Sparkle stars rotating around it
      ctx.save();
      for(let s=0;s<4;s++){
        const sa=p.luckyPulse*.5+s*Math.PI/2;
        const sx=Math.cos(sa)*(r+22),sy=Math.sin(sa)*(r+22);
        ctx.fillStyle='#ffffff';
        ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
        ctx.fillText('✦',sx,sy);
      }
      ctx.restore();
    }
    ctx.restore();
  }

  // Top obstacle
  drawOne(p.x,tH,p.topSat,p.topPts,p.rot1,p.topR);
  // Bottom obstacle
  drawOne(p.x,bY,p.botSat,p.botPts,p.rot2,p.botR);

  // Lucky ✦ marker in gap centre — BIG
  if(p.isLucky){
    ctx.save();
    const cy=tH+(bY-tH)/2;
    // Outer pulsing glow
    ctx.globalAlpha=.5+.4*Math.sin(p.luckyPulse);
    ctx.fillStyle='#ffdd00';
    ctx.beginPath();ctx.arc(p.x,cy,28,0,Math.PI*2);ctx.fill();
    // Bright inner glow
    ctx.globalAlpha=.85;
    ctx.fillStyle='#fff8cc';
    ctx.beginPath();ctx.arc(p.x,cy,16,0,Math.PI*2);ctx.fill();
    // Star symbol
    ctx.globalAlpha=1;ctx.fillStyle='#ff8800';
    ctx.font='bold 40px Arial';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('✦',p.x,cy);
    // 3x label
    ctx.fillStyle='#ffaa00';ctx.font='bold 9px Orbitron,monospace';
    ctx.fillText('3x',p.x,cy+22);
    ctx.restore();
  }
  // Moving arrow hint
  if(p.type==='moving'){
    ctx.save();ctx.globalAlpha=.35+.25*Math.sin(frame*.1);
    ctx.fillStyle='#aabbcc';ctx.font='bold 9px Arial';ctx.textAlign='center';
    ctx.fillText('↕',p.x,tH-18);ctx.restore();
  }
}

function drawBanana(b){const bob=Math.sin(frame*.08+b.bob)*5;ctx.save();ctx.translate(b.x,b.y+bob);if(b.collected){ctx.globalAlpha=Math.max(0,1-b.collectedTimer*.06);ctx.scale(1+b.collectedTimer*.06,1+b.collectedTimer*.06);}ctx.fillStyle='#ffdd00';ctx.strokeStyle='#cc9900';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,12,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle='#ffcc00';ctx.font='bold 13px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('🍌',0,1);if(!b.collected){ctx.globalAlpha=.4+.4*Math.sin(frame*.15);ctx.strokeStyle='#ffffaa';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.stroke();}ctx.restore();}
function drawWrench(w){
  const bob=Math.sin(frame*.08+w.bob)*8;

  ctx.restore();
  // Glow ring
  ctx.save();ctx.globalAlpha=.6+.3*Math.sin(frame*.15);
  ctx.strokeStyle='#88eeff';ctx.lineWidth=3;
  ctx.beginPath();ctx.arc(0,0,68,0,Math.PI*2);ctx.stroke();

  ctx.scale(4.5,4.5);
  // Wrench body — handle
  ctx.fillStyle='#ccddee';ctx.strokeStyle='#334455';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.roundRect(-12,-3,16,6,1);ctx.fill();ctx.stroke();
  // Wrench head — open jaw at right end
  ctx.beginPath();
  ctx.moveTo(4,-7);ctx.lineTo(12,-7);ctx.lineTo(12,-3);
  ctx.lineTo(8,-3);ctx.lineTo(8,3);ctx.lineTo(12,3);
  ctx.lineTo(12,7);ctx.lineTo(4,7);
  ctx.closePath();ctx.fill();ctx.stroke();
  // Other end (closed loop)
  ctx.beginPath();ctx.arc(-12,0,5,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.fillStyle='#334455';ctx.beginPath();ctx.arc(-12,0,2.5,0,Math.PI*2);ctx.fill();
  // Highlight on handle
  ctx.save();ctx.globalAlpha=.6;ctx.fillStyle='#fff';
  ctx.fillRect(-10,-2,5,1.2);
  ctx.restore();
  ctx.restore();
}

let lastFrameTime=0;
// FPS tracking
let fpsEl=null;
let fpsFrames=0, fpsLastSample=performance.now(), fpsCurrent=60;
let fpsMin=999, fpsMax=0, fpsSamples=[];
let fpsShown=false;
function fpsToggle(){
  fpsShown=!fpsShown;
  if(!fpsEl)fpsEl=document.getElementById('fps');
  if(fpsEl)fpsEl.style.display=fpsShown?'block':'none';
}

function loop(ts){
  if(gamePaused){requestAnimationFrame(loop);return;}
  // Cap at 60fps for consistent speed on 120Hz displays
  if(ts-lastFrameTime<14){requestAnimationFrame(loop);return;}
  // Track FPS — measured between render frames
  const dt=ts-lastFrameTime;
  if(lastFrameTime>0){
    const instFps=1000/dt;
    fpsSamples.push(instFps);
    if(fpsSamples.length>60)fpsSamples.shift();
  }
  lastFrameTime=ts;
  fpsFrames++;
  if(ts-fpsLastSample>=500){
    // Compute average over last samples
    const avg=fpsSamples.reduce((a,b)=>a+b,0)/Math.max(1,fpsSamples.length);
    fpsCurrent=Math.round(avg);
    const sampleMin=Math.min(...fpsSamples);
    const sampleMax=Math.max(...fpsSamples);
    fpsMin=Math.min(fpsMin,sampleMin);
    fpsMax=Math.max(fpsMax,sampleMax);
    fpsLastSample=ts;
    if(fpsShown){
      if(!fpsEl)fpsEl=document.getElementById('fps');
      if(fpsEl){
        // Object counts that may affect performance
        const pipeCount=(typeof pipes!=='undefined')?pipes.length:0;
        const obsCount=(typeof BNS!=='undefined'&&BNS.obs)?BNS.obs.length:0;
        const partActive=particlePool.filter(p=>p.active).length;
        const exhActive=exhaustPool.filter(p=>p.active).length;
        fpsEl.innerHTML='FPS '+fpsCurrent+'<br>'+
          '<span style="opacity:.7">min '+Math.round(fpsMin)+' / max '+Math.round(fpsMax)+'</span><br>'+
          '<span style="opacity:.7">obs '+pipeCount+' bns '+obsCount+'</span><br>'+
          '<span style="opacity:.7">prt '+partActive+'+'+exhActive+'</span><br>'+
          '<span style="opacity:.7">spd '+(typeof speed!=='undefined'?speed.toFixed(1):'-')+'</span>';
        fpsEl.classList.remove('warn','crit');
        if(fpsCurrent<30)fpsEl.classList.add('crit');
        else if(fpsCurrent<50)fpsEl.classList.add('warn');
      }
    }
  }
  frame++;
  // Pause button visibility (only write DOM on change)
  const wantBtn=PAUSABLE_STATES.includes(state)&&!userPaused;
  if(wantBtn!==pauseBtnShown){pauseBtnShown=wantBtn;pauseBtn.style.display=wantBtn?'flex':'none';}
  // Deliberate user pause: render frozen world + overlay, skip all updates
  if(userPaused&&PAUSABLE_STATES.includes(state)){
    try{
      if(state==='playing')draw(ts);
      else if(state==='blackhole')drawBlackhole();
      else drawBonus();
      if(pauseMode==='paused')drawPauseOverlay();
      else if(pauseMode==='countdown'){
        drawCountdown();
        countdownTimer--;
        if(countdownTimer<=0)finishResume();
      }
    }catch(e){console.error('Pause overlay error:',e);}
    requestAnimationFrame(loop);
    return;
  }
  try{
    if(state==='playing'){
      if(slowMoTimer>0){slowMoTimer--;slowMoSkip=!slowMoSkip;if(!slowMoSkip)update();}
      else update();
      draw(ts);
    }
    else if(state==='resume'){draw(ts);drawResumeOverlay();}
    else if(state==='blackhole'){updateBlackhole();drawBlackhole();}
    else if(state==='bonus'||state==='approach'){
      for(const p of exhaustPool){if(!p.active)continue;p.x+=p.vx;p.y+=p.vy;p.life-=.07;p.r*=.92;if(p.life<=0)p.active=false;}
      for(const p of particlePool){if(!p.active)continue;p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=.03;if(p.life<=0)p.active=false;}
      if(shake>0)shake*=.8;if(flash>0)flash*=.82;
      updateBonus();updateRepair();drawBonus();
    }
    else if(state==='menu'){
      if(ts-lastMenuDraw>16){updateMenu();drawMenuScene();lastMenuDraw=ts;}
    }else{
      if(ts-lastMenuDraw>33){for(const s of stars){s.x-=s.spd*.2;if(s.x<0)s.x=W;}for(const p of planets){p.x-=p.spd*.15;if(p.x<-60)p.x=W+60;}starsDirty=true;draw(ts);lastMenuDraw=ts;}
    }
  }catch(e){
    console.error('Game loop error in state '+state+':',e);
  }
  requestAnimationFrame(loop);
}

function showUpgradeShop(){
state='shop';
  const upRow=(k)=>{const u=UPGRADES[k],lv=upgrades[k],mx=lv>=u.max,cost=mx?0:u.cost[lv],can=bananas>=cost,bar='■'.repeat(lv)+'□'.repeat(u.max-lv);
  return `<div style="display:flex;align-items:center;gap:8px;margin:6px 0;padding:10px 12px;background:rgba(255,255,255,.04);border-radius:8px;border:1px solid rgba(255,255,255,.1)"><div style="flex:1"><div style="color:#ffcc00;font-size:11px;font-weight:700;letter-spacing:1px">${u.name}</div><div style="color:#555;font-size:9px;margin-top:2px">${u.desc} ${bar}</div></div><button id="u_${k}" style="background:${mx?'rgba(0,200,0,.1)':can?'rgba(255,180,0,.15)':'rgba(255,0,0,.1)'};border:1px solid ${mx?'rgba(0,200,0,.4)':can?'rgba(255,180,0,.5)':'rgba(255,0,0,.3)'};color:${mx?'#44ff44':can?'#ffcc00':'#ff6666'};font-size:10px;font-weight:700;padding:8px 10px;border-radius:6px;cursor:pointer;font-family:Orbitron,monospace;min-height:42px">${mx?'MAX':'🍌 '+cost}</button></div>`;};
  const dm=dailyMultiplier();
  OV.style.display='flex';OV.innerHTML=`<div style="width:100%;max-width:360px">
    <div style="color:#ffcc00;font-size:14px;font-weight:900;letter-spacing:3px;text-align:center;margin-bottom:4px">UPGRADES</div>
    <div style="color:#ffcc00;font-size:11px;text-align:center;margin-bottom:3px">🍌 ${fmtN(bananas)} BANANAS</div>
    <div style="color:#888;font-size:9px;text-align:center;margin-bottom:12px">TODAY ${dm}x BANANAS (DAY ${dailyStreak} 🔥)</div>
    ${upRow('hitbox')}${upRow('bounce')}${upRow('magnet')}${upRow('coinbonus')}
    <div style="color:#666;font-size:9px;letter-spacing:2px;margin:14px 0 6px">BOOSTS</div>
    ${boostsHTML()}
    <button id="btnBack2" style="${BSec};margin-top:6px;width:100%">⌂ BACK TO MENU</button>
  </div>`;
  ['hitbox','bounce','magnet','coinbonus'].forEach(k=>{document.getElementById('u_'+k).onclick=()=>{const u=UPGRADES[k],lv=upgrades[k];if(lv>=u.max)return;const cost=u.cost[lv];if(bananas<cost)return;bananas-=cost;upgrades[k]++;LS.set('coins',bananas);LS.set('upgrades',upgrades);sndUpgrade();showUpgradeShop();};});
  document.getElementById('btnBack2').onclick=()=>showMenu();
  const insBtn=document.getElementById('btnIns');
  if(insBtn)insBtn.onclick=()=>{if(hasInsurance||bananas<400)return;bananas-=400;LS.set('coins',bananas);hasInsurance=true;saveBoosts();sndUpgrade();showUpgradeShop();};
  const dblBtn=document.getElementById('btnDbl');
  if(dblBtn)dblBtn.onclick=()=>{
    if(bananas<1000)return;
    bananas-=1000;LS.set('coins',bananas);
    // Extend: add 24h to current remaining time (or start 24h from now if expired)
    const now=Date.now();
    const baseTime=Math.max(now,bananaDoublerExpiresAt);
    bananaDoublerExpiresAt=baseTime+24*3600*1000;
    saveBoosts();sndUpgrade();showUpgradeShop();
  };
  const repBtn=document.getElementById('btnRep');
  if(repBtn)repBtn.onclick=()=>{if(bananas<2000)return;bananas-=2000;LS.set('coins',bananas);autoRepairCharges++;saveBoosts();sndUpgrade();showUpgradeShop();};
}

       </div>`
    : `<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,180,0,.4);border-radius:8px;padding:8px 12px;margin:6px auto 8px;width:260px;text-align:left">
        <div style="display:flex;justify-content:space-between;align-items:center"><div style="color:#ffcc00;font-size:10px;font-weight:700;letter-spacing:1px">🎯 DAILY MISSION</div><div style="color:#ffcc00;font-size:10px;font-weight:700">+${fmtN(m.reward)} 🍌</div></div>
        <div style="color:#ddd;font-size:10px;margin-top:3px">${labelText}</div>
        <div style="height:5px;background:rgba(255,255,255,.08);border-radius:3px;margin-top:5px;overflow:hidden"><div style="height:100%;width:${pctW}%;background:linear-gradient(90deg,#ff8800,#ffcc00);transition:width .3s"></div></div>
        <div style="color:#888;font-size:9px;margin-top:3px;text-align:right">${fmtN(progress)} / ${fmtN(m.target)}</div>
       </div>`;
  OV.style.display='flex';OV.innerHTML=`
    <div style="color:#ffcc00;font-size:36px;font-weight:900;letter-spacing:3px;text-shadow:0 0 18px #ffaa00;margin-bottom:2px">MONKEY</div>
    <div style="color:#ff6600;font-size:20px;font-weight:700;letter-spacing:2px;margin-bottom:8px">SHUTTLE</div>
    <div style="color:#886644;font-size:11px;margin-bottom:3px">RUNS: ${fmtN(totalRuns)} &nbsp;|&nbsp; BEST: ${fmtN(hiScore)}</div>
    ${streakInfo}
    ${missionCard}
    <div style="color:#ffcc00;font-size:13px;margin-bottom:12px">🍌 ${fmtN(bananas)} BANANAS${hasBananaDoubler()?' ⚡x2':''}</div>
    <button id="bPlay" style="${BPri};width:240px">▶ PLAY</button>
    <div style="display:flex;gap:6px;margin-top:4px;width:240px">
      <button id="bUpg" style="${BSec};font-size:9px;letter-spacing:.5px">⚡ UPGRADES</button>
      <button id="bHelp" style="${BSec};font-size:9px;letter-spacing:.5px">❓ HOW</button>
      <button id="bOpt" style="${BSec};font-size:9px;letter-spacing:.5px">⚙ OPTIONS</button>
    </div>`;
  insuranceUsed=false;
  document.getElementById('bPlay').onclick=()=>startGame();
  document.getElementById('bUpg').onclick=()=>showUpgradeShop();
  document.getElementById('bHelp').onclick=()=>showHowToPlay();
  document.getElementById('bOpt').onclick=()=>showOptions();
}

function startGame(){
  updateDailyStreak();
  OV.style.display='none';OV.innerHTML='';
  s1El.style.display='block';
  s1El.textContent='0';
  state='playing';resetGame();resize();
}

function showDead(finalBananas,baseBananas,dm,afterDaily,missionWon){
  s1El.style.display='block';resize();

  const fs=p1.score;
  const rec=fs>=hiScore&&fs>0;
  // Banana math breakdown
  let mathRows=`<div style="display:flex;justify-content:space-between;color:#aaa"><span>Collected:</span><span style="color:#fff">${fmtN(baseBananas||0)} 🍌</span></div>`;
  if(dm>1){mathRows+=`<div style="display:flex;justify-content:space-between;color:#ffee00"><span>× ${dm} daily streak:</span><span>${fmtN(afterDaily)} 🍌</span></div>`;}
  if(hasBananaDoubler()){mathRows+=`<div style="display:flex;justify-content:space-between;color:#ffdd00"><span>× 2 banana doubler:</span><span>${fmtN(finalBananas)} 🍌</span></div>`;}
  const breakdownBox=`<div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 12px;margin:0 auto 10px;width:240px;font-size:11px;font-family:Orbitron,monospace;letter-spacing:.5px">${mathRows}<div style="height:1px;background:rgba(255,255,255,.15);margin:6px 0"></div><div style="display:flex;justify-content:space-between;color:#ffcc00;font-weight:700"><span>EARNED:</span><span>+${fmtN(finalBananas)} 🍌</span></div></div>`;
  OV.style.display='flex';OV.innerHTML=`<div style="text-align:center;padding:8px 0">
    <div style="color:#ff5500;font-size:18px;font-weight:900;letter-spacing:2px">HOUSTON WE HAVE</div>
    <div style="color:#ff5500;font-size:18px;font-weight:900;letter-spacing:2px;margin-bottom:8px">A PROBLEM</div>
    
    <div style="color:#fff;font-size:56px;font-weight:900;text-shadow:0 0 18px #ffaa00;line-height:1">${fmtN(fs)}</div>
    ${rec?`<div style="color:#ffee00;font-size:12px;font-weight:700;margin:4px 0">⭐ NEW RECORD!</div>`:''}
    <div style="color:#886644;font-size:11px;margin-bottom:8px">BEST: ${fmtN(hiScore)}</div>
    ${missionWon?`<div style="background:rgba(0,220,100,.12);border:1px solid rgba(0,220,100,.5);border-radius:8px;padding:8px 12px;margin:0 auto 10px;width:240px;color:#44ff88;font-size:11px;font-weight:700;letter-spacing:1px">🎯 DAILY MISSION COMPLETE!<div style="font-size:10px;margin-top:2px;color:#ffcc00">+${fmtN(currentMission().reward)} 🍌 BONUS</div></div>`:''}
    ${breakdownBox}
    <button id="dRetry" style="${BPri};width:240px">▶ RETRY</button>
    <button id="dMenu" style="${BSec};display:block;width:240px;margin:4px auto">⌂ MAIN MENU</button>
    <button id="dShare" style="background:rgba(0,180,255,.1);border:1px solid rgba(0,180,255,.35);color:#55ccff;font-size:11px;font-weight:700;padding:10px 0;border-radius:8px;cursor:pointer;font-family:Orbitron,monospace;width:240px;min-height:42px;margin:4px auto;display:block">📤 SHARE SCORE</button>
  </div>`;
  document.getElementById('dRetry').onclick=()=>startGame();
  document.getElementById('dMenu').onclick=()=>showMenu();
  document.getElementById('dShare').onclick=()=>{
    const sc2=document.createElement('canvas');sc2.width=400;sc2.height=200;const c=sc2.getContext('2d');
    const bg=c.createLinearGradient(0,0,400,200);bg.addColorStop(0,'#01060f');bg.addColorStop(1,'#020b1e');c.fillStyle=bg;c.fillRect(0,0,400,200);
    c.fillStyle='#ffcc00';c.font='bold 24px Orbitron,monospace';c.textAlign='center';c.fillText('MONKEY SHUTTLE',200,44);
    c.fillStyle='#ff8800';c.font='12px Orbitron,monospace';c.fillText('MONKEY SHUTTLE',200,68);
    c.fillStyle='#fff';c.font='bold 66px Orbitron,monospace';c.fillText(fmtN(fs),200,148);
    c.fillStyle='#888';c.font='11px Orbitron,monospace';c.fillText('BEST: '+fmtN(hiScore)+'  |  DAY '+dailyStreak+' STREAK',200,174);
    const img=sc2.toDataURL();
    OV.innerHTML=`<div style="text-align:center"><img src="${img}" style="border-radius:8px;max-width:320px;width:100%;border:1px solid rgba(255,180,0,.3)"><div style="color:#aaa;font-size:10px;margin-top:8px">HOLD TO SAVE IMAGE</div><button id="sBack" style="${BSec};margin-top:10px">CLOSE</button></div>`;
    document.getElementById('sBack').onclick=()=>showDead(finalBananas,baseBananas,dm,afterDaily);
  };
}

// ── BOOT ─────────────────────────────────────────────────────────
requestAnimationFrame(loop);
showMenu();
</script>
</body>
</html>
