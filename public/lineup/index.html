<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lineup Card</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d1a0f;
  --surface: rgba(255,255,255,0.04);
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.18);
  --cream: #f2ede3;
  --cream-dim: #b8b0a0;
  --tan: #9e8e74;
  --gold: #d4a843;
  --gold-dim: rgba(212,168,67,0.2);
}

/* ── TEAM COLORS ── */
.t-red    { --tc: #c0392b; --tc-light: #e74c3c; --tc-bg: rgba(192,57,43,0.12); --tc-border: rgba(192,57,43,0.4); }
.t-blue   { --tc: #2471a3; --tc-light: #3498db; --tc-bg: rgba(36,113,163,0.12); --tc-border: rgba(36,113,163,0.4); }
.t-green  { --tc: #1e8449; --tc-light: #27ae60; --tc-bg: rgba(30,132,73,0.12);  --tc-border: rgba(30,132,73,0.4); }
.t-purple { --tc: #7d3c98; --tc-light: #9b59b6; --tc-bg: rgba(125,60,152,0.12); --tc-border: rgba(125,60,152,0.4); }
.t-orange { --tc: #ca6f1e; --tc-light: #e67e22; --tc-bg: rgba(202,111,30,0.12); --tc-border: rgba(202,111,30,0.4); }
.t-teal   { --tc: #148f77; --tc-light: #1abc9c; --tc-bg: rgba(20,143,119,0.12); --tc-border: rgba(20,143,119,0.4); }
.t-gold   { --tc: #b7950b; --tc-light: #d4a843; --tc-bg: rgba(183,149,11,0.12); --tc-border: rgba(183,149,11,0.4); }
.t-maroon { --tc: #922b21; --tc-light: #c0392b; --tc-bg: rgba(146,43,33,0.12);  --tc-border: rgba(146,43,33,0.4); }
.t-navy   { --tc: #1a5276; --tc-light: #2471a3; --tc-bg: rgba(26,82,118,0.12);  --tc-border: rgba(26,82,118,0.4); }

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 70% 50% at 20% 30%, rgba(30,80,40,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 70% at 80% 70%, rgba(20,50,30,0.3) 0%, transparent 60%);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  color: var(--cream);
  -webkit-tap-highlight-color: transparent;
}

.app { max-width: 520px; margin: 0 auto; padding: 2.5rem 1.25rem 4rem; }

/* HEADER */
.header { text-align: center; margin-bottom: 3rem; }
.logo-mark {
  display: inline-flex; align-items: center; justify-content: center;
  width: 56px; height: 56px; background: var(--gold); border-radius: 14px;
  margin: 0 auto 1rem;
}
.logo-mark svg { width: 32px; height: 32px; }
.header h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 46px; letter-spacing: 0.08em; color: var(--cream); line-height: 1;
}
.header p {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.2em; text-transform: uppercase; color: var(--tan); margin-top: 6px;
}

/* TEAM CARDS */
.teams { display: flex; flex-direction: column; gap: 12px; }

.team-card {
  background: var(--surface);
  border: 1px solid var(--tc-border, var(--border));
  border-radius: 16px;
  overflow: hidden;
  transition: border-color 0.2s, transform 0.15s;
  position: relative;
}
.team-card:hover { transform: translateY(-1px); }

/* Color accent bar */
.team-card::before {
  content: '';
  position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px;
  background: var(--tc, transparent);
  border-radius: 16px 0 0 16px;
}

.team-main {
  display: flex; align-items: center; gap: 0; cursor: pointer;
  padding: 1.1rem 1.25rem 1.1rem 1.5rem;
}
.team-main:hover .team-name { color: var(--tc-light, var(--gold)); }

.team-color-dot {
  width: 36px; height: 36px; border-radius: 10px;
  background: var(--tc-bg, rgba(255,255,255,0.06));
  border: 1.5px solid var(--tc-border, var(--border-strong));
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; margin-right: 14px;
  font-family: 'Bebas Neue', sans-serif; font-size: 16px;
  color: var(--tc-light, var(--cream-dim));
  letter-spacing: 0.05em;
}

.team-info { flex: 1; min-width: 0; }
.team-name {
  font-family: 'Bebas Neue', sans-serif; font-size: 22px;
  letter-spacing: 0.05em; color: var(--cream);
  transition: color 0.15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.team-meta {
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.08em; text-transform: uppercase; color: var(--tan); margin-top: 2px;
}

.team-arrow {
  color: var(--tc-light, var(--tan)); font-size: 18px; flex-shrink: 0; margin-left: 10px;
  transition: transform 0.15s;
}
.team-main:hover .team-arrow { transform: translateX(3px); }

/* EDIT DRAWER */
.team-drawer {
  display: none; border-top: 1px solid var(--border);
  padding: 1rem 1.25rem 1.1rem 1.5rem;
  background: rgba(0,0,0,0.2);
}
.team-drawer.open { display: block; }

.drawer-row { display: flex; gap: 8px; margin-bottom: 10px; align-items: center; }
.drawer-label {
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--tan); width: 52px; flex-shrink: 0;
}
.team-name-input {
  flex: 1; background: rgba(255,255,255,0.06); border: 1px solid var(--border-strong);
  border-radius: 8px; padding: 7px 10px; color: var(--cream);
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  outline: none; caret-color: var(--gold);
}
.team-name-input:focus { border-color: var(--tc-light, var(--gold)); }

/* COLOR SWATCHES */
.color-swatches { display: flex; gap: 7px; flex-wrap: wrap; }
.swatch {
  width: 26px; height: 26px; border-radius: 7px; cursor: pointer; border: 2px solid transparent;
  transition: all 0.15s; flex-shrink: 0;
}
.swatch:hover { transform: scale(1.12); }
.swatch.selected { border-color: #fff; transform: scale(1.15); }
.swatch-red    { background: #c0392b; }
.swatch-blue   { background: #2471a3; }
.swatch-green  { background: #1e8449; }
.swatch-purple { background: #7d3c98; }
.swatch-orange { background: #ca6f1e; }
.swatch-teal   { background: #148f77; }
.swatch-gold   { background: #b7950b; }
.swatch-maroon { background: #922b21; }
.swatch-navy   { background: #1a5276; }

/* DRAWER ACTIONS */
.drawer-actions { display: flex; gap: 7px; margin-top: 4px; }
.daction {
  flex: 1; padding: 8px 6px; border: none; border-radius: 9px;
  font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.07em;
  text-transform: uppercase; cursor: pointer; transition: all 0.15s; font-weight: 500;
}
.daction-save { background: var(--cream); color: #0d1a0f; }
.daction-save:hover { background: #fff; }
.daction-reset { background: rgba(212,168,67,0.12); color: var(--gold); border: 1px solid rgba(212,168,67,0.3); }
.daction-reset:hover { background: rgba(212,168,67,0.2); }
.daction-delete { background: rgba(192,57,43,0.1); color: #e74c3c; border: 1px solid rgba(192,57,43,0.25); }
.daction-delete:hover { background: rgba(192,57,43,0.2); }

/* EDIT TOGGLE */
.team-edit-btn {
  background: none; border: none; cursor: pointer; color: var(--tan);
  padding: 4px 8px; font-size: 16px; transition: color 0.15s; flex-shrink: 0;
}
.team-edit-btn:hover { color: var(--cream); }

/* EMPTY SLOT */
.team-card.empty .team-name { color: var(--tan); font-size: 18px; }
.team-card.empty .team-color-dot { opacity: 0.4; }

/* FOOTER */
.footer {
  text-align: center; margin-top: 2.5rem;
  font-family: 'DM Mono', monospace; font-size: 10px;
  letter-spacing: 0.12em; text-transform: uppercase; color: var(--tan);
  opacity: 0.5;
}

/* CONFIRM OVERLAY */
.confirm-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  align-items: center; justify-content: center;
}
.confirm-overlay.show { display: flex; }
.confirm-box {
  background: #1a2e1c; border: 1px solid var(--border-strong);
  border-radius: 16px; padding: 1.75rem; width: 300px; text-align: center;
}
.confirm-box h3 { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
.confirm-box p { font-size: 13px; color: var(--cream-dim); margin-bottom: 1.25rem; line-height: 1.5; }
.confirm-btns { display: flex; gap: 8px; }
.confirm-btns button { flex: 1; padding: 10px; border: none; border-radius: 9px; font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; font-weight: 500; }
.confirm-cancel { background: rgba(255,255,255,0.08); color: var(--cream-dim); }
.confirm-ok { background: #c0392b; color: #fff; }

@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
.team-card { animation: fadeIn 0.3s ease backwards; }
.team-card:nth-child(1) { animation-delay: 0.05s; }
.team-card:nth-child(2) { animation-delay: 0.12s; }
.team-card:nth-child(3) { animation-delay: 0.19s; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="logo-mark">
      <!-- Baseball diamond icon -->
      <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="13" y="2" width="6" height="6" rx="1" transform="rotate(45 16 5)" fill="#0d1a0f"/>
        <rect x="2" y="13" width="6" height="6" rx="1" transform="rotate(45 5 16)" fill="#0d1a0f"/>
        <rect x="24" y="13" width="6" height="6" rx="1" transform="rotate(45 27 16)" fill="#0d1a0f"/>
        <polygon points="16,30 5,19 16,8 27,19" fill="none" stroke="#0d1a0f" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="2.5" fill="#0d1a0f"/>
      </svg>
    </div>
    <h1>Lineup Card</h1>
    <p>Select a team to manage</p>
  </div>

  <div class="teams" id="teams-list"></div>

  <p class="footer">Youth Baseball Roster Manager</p>
</div>

<!-- CONFIRM DIALOG -->
<div class="confirm-overlay" id="confirm-overlay">
  <div class="confirm-box">
    <h3 id="confirm-title">Reset Team?</h3>
    <p id="confirm-msg">This will clear all roster and lineup data for this team.</p>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="confirm-ok" id="confirm-ok-btn">Confirm</button>
    </div>
  </div>
</div>

<script>
const TEAMS_KEY = 'lc_teams_v1';
const COLORS = ['red','blue','green','purple','orange','teal','gold','maroon','navy'];
const DEFAULT_TEAMS = [
  { id:1, name:'Team 1', color:'red',   created:Date.now() },
  { id:2, name:'Team 2', color:'blue',  created:Date.now() },
  { id:3, name:'Team 3', color:'green', created:Date.now() },
];

function loadTeams(){
  try{ const s=localStorage.getItem(TEAMS_KEY); if(s) return JSON.parse(s); }catch(e){}
  return DEFAULT_TEAMS.map(t=>({...t}));
}
function saveTeams(teams){ try{localStorage.setItem(TEAMS_KEY,JSON.stringify(teams));}catch(e){} }

function teamStorageKeys(id){
  return { roster:`lc_r_t${id}_v7`, pos:`lc_p_t${id}_v7` };
}

function getRosterCount(id){
  try{
    const s=localStorage.getItem(`lc_r_t${id}_v7`);
    if(s){ const v=JSON.parse(s); if(Array.isArray(v)) return v.filter(p=>p.name&&!p.benched).length; }
  }catch(e){}
  return 0;
}

function getInitials(name){
  return name.trim().split(/\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2)||'?';
}

let teams = loadTeams();
let openDrawerId = null;

function render(){
  const list = document.getElementById('teams-list');
  list.innerHTML = teams.map(team => {
    const count = getRosterCount(team.id);
    const meta = count > 0 ? `${count} active player${count!==1?'s':''}` : 'No players yet';
    const initials = getInitials(team.name);
    const isOpen = openDrawerId === team.id;
    return `
    <div class="team-card t-${team.color}" id="tc-${team.id}">
      <div class="team-main" onclick="openTeam(${team.id})">
        <div class="team-color-dot">${initials}</div>
        <div class="team-info">
          <div class="team-name">${esc(team.name)}</div>
          <div class="team-meta">${meta}</div>
        </div>
        <button class="team-edit-btn" onclick="toggleDrawer(event,${team.id})" title="Edit team">&#9881;</button>
        <span class="team-arrow">&#8250;</span>
      </div>
      <div class="team-drawer ${isOpen?'open':''}" id="drawer-${team.id}">
        <div class="drawer-row">
          <span class="drawer-label">Name</span>
          <input class="team-name-input" type="text" value="${esc(team.name)}"
            id="name-input-${team.id}"
            oninput="updateDraftName(${team.id},this.value)"
            onkeydown="if(event.key==='Enter')saveTeamEdit(${team.id})"/>
        </div>
        <div class="drawer-row" style="align-items:flex-start;margin-top:2px;">
          <span class="drawer-label" style="padding-top:4px;">Color</span>
          <div class="color-swatches">
            ${COLORS.map(c=>`<div class="swatch swatch-${c} ${team.color===c?'selected':''}" onclick="selectColor(${team.id},'${c}')" title="${c}"></div>`).join('')}
          </div>
        </div>
        <div class="drawer-actions">
          <button class="daction daction-save" onclick="saveTeamEdit(${team.id})">&#10003; Save</button>
          <button class="daction daction-reset" onclick="confirmReset(${team.id})">Reset</button>
          <button class="daction daction-delete" onclick="confirmDelete(${team.id})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');

  // If fewer than 3 teams, show add button
  if(teams.length < 3){
    list.innerHTML += `
    <div class="team-card" style="border-style:dashed;cursor:pointer;" onclick="addTeam()">
      <div class="team-main">
        <div class="team-color-dot" style="font-size:22px;color:var(--tan);">+</div>
        <div class="team-info">
          <div class="team-name" style="color:var(--tan);font-size:18px;">Add Team</div>
          <div class="team-meta">Up to 3 teams</div>
        </div>
      </div>
    </div>`;
  }
}

// Draft edits (before save)
const drafts = {};
function updateDraftName(id, val){ drafts[id] = drafts[id]||{}; drafts[id].name=val; }
function selectColor(id, color){
  drafts[id] = drafts[id]||{};
  drafts[id].color = color;
  // Update swatch selection immediately
  document.querySelectorAll(`#drawer-${id} .swatch`).forEach(s=>{
    s.classList.toggle('selected', s.classList.contains('swatch-'+color));
  });
  // Update card color class preview
  const card = document.getElementById('tc-'+id);
  if(card){
    COLORS.forEach(c=>card.classList.remove('t-'+c));
    card.classList.add('t-'+color);
  }
}

function saveTeamEdit(id){
  const team = teams.find(t=>t.id===id); if(!team) return;
  const d = drafts[id]||{};
  if(d.name!==undefined) team.name = d.name.trim()||team.name;
  if(d.color) team.color = d.color;
  delete drafts[id];
  saveTeams(teams);
  openDrawerId = null;
  render();
}

function toggleDrawer(e, id){
  e.stopPropagation();
  openDrawerId = openDrawerId===id ? null : id;
  drafts[id] = {};
  render();
  // Focus name input
  setTimeout(()=>{ const el=document.getElementById('name-input-'+id); if(el)el.focus(); },50);
}

function openTeam(id){
  const team = teams.find(t=>t.id===id); if(!team) return;
  window.location.href = '/lineup/lineup-card.html?team='+id;
}

function addTeam(){
  if(teams.length>=3) return;
  const usedColors = teams.map(t=>t.color);
  const avail = COLORS.filter(c=>!usedColors.includes(c));
  const color = avail[0]||COLORS[teams.length%COLORS.length];
  const id = Date.now();
  teams.push({ id, name:`Team ${teams.length+1}`, color, created:Date.now() });
  saveTeams(teams);
  openDrawerId = id;
  render();
  setTimeout(()=>{ const el=document.getElementById('name-input-'+id); if(el)el.focus(); },80);
}

function confirmReset(id){
  const team = teams.find(t=>t.id===id);
  showConfirm(
    'Reset Team?',
    `Clear all roster and lineup data for "${team.name}"? This cannot be undone.`,
    ()=>{ doReset(id); }
  );
}
function doReset(id){
  const keys = teamStorageKeys(id);
  Object.values(keys).forEach(k=>localStorage.removeItem(k));
  render();
}

function confirmDelete(id){
  if(teams.length<=1){ alert('You must have at least one team.'); return; }
  const team = teams.find(t=>t.id===id);
  showConfirm(
    'Delete Team?',
    `Permanently delete "${team.name}" and all its data?`,
    ()=>{ doDelete(id); }
  );
}
function doDelete(id){
  doReset(id); // clear storage
  teams = teams.filter(t=>t.id!==id);
  saveTeams(teams);
  openDrawerId = null;
  render();
}

function showConfirm(title, msg, cb){
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  document.getElementById('confirm-ok-btn').onclick = ()=>{ closeConfirm(); cb(); };
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('show'); }

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Init
render();
</script>
</body>
</html>
